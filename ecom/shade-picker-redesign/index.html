<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shade Picker · Variant Toggle · Jones Road</title>
  <style>
    @font-face { font-family: "Canela";                  src: url("./assets/fonts/canela-light.static.woff2") format("woff2");           font-weight: 300; font-display: swap; }
    @font-face { font-family: "GeogrotesqueCondBoldWeb"; src: url("./assets/fonts/geogrotesque-cond-bold.static.woff2") format("woff2"); font-weight: 700; font-display: swap; }
    @font-face { font-family: "RingsideWideWeb";         src: url("./assets/fonts/ringside-wide-book.static.woff2") format("woff2");     font-weight: 400; font-display: swap; }
    @font-face { font-family: "BaseMonoWideWeb";         src: url("./assets/fonts/base-mono-wide-thin.static.woff2") format("woff2");    font-weight: 550; font-display: swap; }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: "RingsideWideWeb", Helvetica, Arial, sans-serif; background: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .toggle-wrap { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #ececec; z-index: 10; }
    .toggle { padding: 12px 16px 10px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .toggle__brand { font-family: "GeogrotesqueCondBoldWeb", "Arial Black", Impact, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; margin-right: 12px; color: #000; flex-shrink: 0; }
    .toggle__brand span { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 11px; letter-spacing: .9px; color: #757575; margin-left: 8px; font-weight: 400; }

    .opt-btn { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 13px; font-weight: 550; letter-spacing: .4px; text-transform: uppercase; color: #000; background: #fff; border: 1px solid #d0d0d0; border-radius: 2px; height: 36px; padding: 0 12px; cursor: pointer; transition: all .4s cubic-bezier(.39, .575, .565, 1); white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; }
    .has-mouse .opt-btn:hover { border-color: #000; }
    .opt-btn[aria-pressed="true"] { background: #000; color: #fff; border-color: #000; }
    .opt-btn__sub { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 11px; letter-spacing: .8px; opacity: .55; font-weight: 400; }
    .opt-btn[aria-pressed="true"] .opt-btn__sub { opacity: .8; }
    .opt-divider { width: 1px; height: 22px; background: #ececec; margin: 0 4px; }
    .toggle__hint { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 11px; letter-spacing: .9px; color: #757575; margin-left: auto; flex-shrink: 0; }

    .desc { padding: 14px 20px; border-top: 1px solid #ececec; background: #f8f8f8; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 18px; align-items: start; }
    @media (max-width: 768px) { .desc { grid-template-columns: 1fr; } }
    .desc__main { min-width: 0; }
    .desc__name { font-family: "GeogrotesqueCondBoldWeb", "Arial Black", Impact, sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.18px; color: #000; margin: 0 0 4px 0; }
    .desc__name code { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 11px; font-weight: 550; letter-spacing: .9px; background: #000; color: #fff; padding: 2px 6px; border-radius: 2px; margin-right: 8px; vertical-align: 1px; }
    .desc__body { font-family: "RingsideWideWeb", Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.5; color: #000; margin: 0; max-width: 90ch; }
    .desc__solves { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 11px; letter-spacing: .9px; text-transform: uppercase; color: #757575; margin-top: 6px; font-weight: 400; }
    .desc__solves strong { color: #000; font-family: "GeogrotesqueCondBoldWeb", "Arial Black", Impact, sans-serif; font-weight: 700; }
    .desc__tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-start; }
    .desc__tag { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 11px; letter-spacing: .8px; text-transform: uppercase; padding: 3px 7px; border: 1px solid #d0d0d0; border-radius: 2px; color: #000; white-space: nowrap; font-weight: 400; }

    .frame-wrap { flex: 1; overflow: hidden; background: #f8f8f8; }
    .frame { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <div class="toggle-wrap">
    <header class="toggle" role="tablist" aria-label="Shade picker variants">
      <span class="toggle__brand">Shade Picker <span>7 variants</span></span>

      <button type="button" class="opt-btn" data-opt="option-f.html" aria-pressed="true">F<span class="opt-btn__sub">Full Swap</span></button>
      <button type="button" class="opt-btn" data-opt="option-g.html">G<span class="opt-btn__sub">Adaptive Count</span></button>
      <button type="button" class="opt-btn" data-opt="option-l.html">L<span class="opt-btn__sub">Compare 2</span></button>
      <button type="button" class="opt-btn" data-opt="option-m.html">M<span class="opt-btn__sub">Skin Twin</span></button>

      <span class="opt-divider"></span>

      <button type="button" class="opt-btn" data-opt="option-q.html">Q<span class="opt-btn__sub">5×6 Reel</span></button>
      <button type="button" class="opt-btn" data-opt="option-r.html">R<span class="opt-btn__sub">One Row</span></button>
      <button type="button" class="opt-btn" data-opt="option-s.html">S<span class="opt-btn__sub">Stacked Rows</span></button>

      <span class="toggle__hint" aria-hidden="true">↑ keys 1-7</span>
    </header>
    <div class="desc">
      <div class="desc__main">
        <p class="desc__name" data-desc-name></p>
        <p class="desc__body" data-desc-body></p>
        <p class="desc__solves" data-desc-solves></p>
      </div>
      <div class="desc__tags" data-desc-tags></div>
    </div>
  </div>

  <div class="frame-wrap">
    <iframe class="frame" data-frame src="option-f.html" title="Variant preview"></iframe>
  </div>

  <script>
    const variants = {
      "option-f.html": {
        name: "Full Swap",
        kicker: "F",
        body: "30-grid stays put when you change category — only the swatch row updates. Pick a shade and the grid hard-cuts to a single model wearing it. Closest to Zoe's original spec.",
        solves: "Validates the spec verbatim",
        tags: ["Zoe spec", "hard cut", "30-grid"]
      },
      "option-g.html": {
        name: "Adaptive Count",
        kicker: "G",
        body: "Click a category and the grid replaces with only those shades' models, sized to the count as squares (1 fills the frame; 2/3/4/5/6 in a single row). Click a shade and the adaptive grid hard-cuts to a single full-bleed model.",
        solves: "Cody's \"responsive to count\" idea + per-shade reveal",
        tags: ["adaptive", "single-row", "shade swap"]
      },
      "option-l.html": {
        name: "Compare 2",
        kicker: "L",
        body: "Pick a first shade — it locks into Slot 1. Pick a second — stage splits 50/50 with both models side-by-side, plus a one-line diff and the matching arm swatch beneath each panel.",
        solves: "\"I'm in between colors so I need to mix two\"",
        tags: ["white space", "side-by-side"]
      },
      "option-m.html": {
        name: "Skin Twin",
        kicker: "M",
        body: "Tap the model whose skin looks like yours. No popup, no zoom — her shade and her full \"get the look\" (Miracle Balm, Lip Recharge, Face Pencil) appear on the right. The 30-grid stays clickable. Filter by skin-tone range.",
        solves: "\"I picked by hair color, not skin tone\" + cross-product discovery",
        tags: ["face-first", "get-the-look", "JRB-audited"]
      },
      "option-q.html": {
        name: "5×6 Reel · Merit",
        kicker: "Q",
        body: "30 cards in a 5×6 grid (the original Merit-style layout). Hover a card to see the shade swept across her cheek; click for the full editorial modal with prev/next nav.",
        solves: "Show all 30 in one view — but feels heavy on the eyes",
        tags: ["5×6 grid", "all-30 visible", "modal"]
      },
      "option-r.html": {
        name: "One Row",
        kicker: "R",
        body: "All 30 in a single horizontal row, ~5 visible at a time. Scroll arrows on desktop, swipe on mobile. Way less overwhelming than a wall of faces — closer to Merit's actual PDP pattern.",
        solves: "\"30 images at once feels like a ton\" — Cody's note",
        tags: ["horizontal scroll", "Merit literal", "5-at-a-time"]
      },
      "option-s.html": {
        name: "Stacked Rows",
        kicker: "S",
        body: "Seven mini horizontal rows, one per skin-tone range. Each row pre-labeled with a description (\"Pale · 5 shades · Porcelain to soft warm linen…\"). Browse only the row that's yours.",
        solves: "Decision fatigue — pre-categorize so users skip what isn't theirs",
        tags: ["7 mini-rows", "pre-labeled", "low-friction"]
      }
    };

    (function () {
      const buttons = Array.from(document.querySelectorAll(".opt-btn"));
      const frame = document.querySelector("[data-frame]");
      const descName = document.querySelector("[data-desc-name]");
      const descBody = document.querySelector("[data-desc-body]");
      const descSolves = document.querySelector("[data-desc-solves]");
      const descTags = document.querySelector("[data-desc-tags]");

      function activate(file, push = true) {
        buttons.forEach(b => b.setAttribute("aria-pressed", String(b.dataset.opt === file)));
        if (frame.getAttribute("src") !== file) frame.setAttribute("src", file);
        const v = variants[file];
        if (v) {
          descName.innerHTML = `<code>${v.kicker}</code>${v.name}`;
          descBody.textContent = v.body;
          descSolves.innerHTML = v.solves ? `<strong>Solves:</strong> ${v.solves}` : "";
          descTags.innerHTML = (v.tags || []).map(t => `<span class="desc__tag">${t}</span>`).join("");
        }
        if (push) {
          const hash = "#" + file.replace(".html", "").replace("option-", "");
          if (location.hash !== hash) history.replaceState(null, "", hash);
        }
      }

      buttons.forEach(b => b.addEventListener("click", () => activate(b.dataset.opt)));

      const keymap = { "1": "option-f.html", "2": "option-g.html", "3": "option-l.html", "4": "option-m.html", "5": "option-q.html", "6": "option-r.html", "7": "option-s.html" };
      window.addEventListener("keydown", e => {
        if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
        const file = keymap[e.key];
        if (file) activate(file);
      });

      const hash = location.hash.replace("#", "");
      if (hash) {
        const candidate = "option-" + hash + ".html";
        if (buttons.some(b => b.dataset.opt === candidate)) activate(candidate, false);
      } else {
        activate("option-f.html", false);
      }
    })();

    document.addEventListener('mousemove', function addMouse() {
      document.body.classList.add('has-mouse');
      document.removeEventListener('mousemove', addMouse);
    });
  </script>
</body>
</html>
