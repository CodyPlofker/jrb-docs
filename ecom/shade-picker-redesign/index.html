<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shade Picker · Variant Toggle · Jones Road</title>
  <style>
    @font-face { font-family: "Canela";                  src: url("./assets/fonts/canela-light.static.woff2") format("woff2");           font-weight: 300; font-display: swap; }
    @font-face { font-family: "GeogrotesqueCondBoldWeb"; src: url("./assets/fonts/geogrotesque-cond-bold.static.woff2") format("woff2"); font-weight: 700; font-display: swap; }
    @font-face { font-family: "RingsideWideWeb";         src: url("./assets/fonts/ringside-wide-book.static.woff2") format("woff2");     font-weight: 400; font-display: swap; }
    @font-face { font-family: "BaseMonoWideWeb";         src: url("./assets/fonts/base-mono-wide-thin.static.woff2") format("woff2");    font-weight: 550; font-display: swap; }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: "RingsideWideWeb", Helvetica, Arial, sans-serif; background: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .toggle-wrap { background: #fff; border-bottom: 1px solid #ececec; z-index: 10; }
    .toggle { padding: 12px 16px 10px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .toggle__brand { font-family: "GeogrotesqueCondBoldWeb", "Arial Black", Impact, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; margin-right: 12px; color: #000; flex-shrink: 0; }
    .toggle__brand span { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 11px; letter-spacing: .9px; color: #757575; margin-left: 8px; font-weight: 400; }

    .opt-btn { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 13px; font-weight: 550; letter-spacing: .4px; text-transform: uppercase; color: #000; background: #fff; border: 1px solid #d0d0d0; border-radius: 2px; height: 36px; padding: 0 10px; cursor: pointer; transition: all .4s cubic-bezier(.39, .575, .565, 1); white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; }
    .has-mouse .opt-btn:hover { border-color: #000; }
    .opt-btn[aria-pressed="true"] { background: #000; color: #fff; border-color: #000; }
    .opt-btn__sub { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 11px; letter-spacing: .8px; opacity: .55; font-weight: 400; }
    .opt-btn[aria-pressed="true"] .opt-btn__sub { opacity: .8; }
    .opt-divider { width: 1px; height: 22px; background: #ececec; margin: 0 4px; }

    .desc { padding: 14px 20px; border-top: 1px solid #ececec; background: #f8f8f8; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 18px; align-items: start; }
    @media (max-width: 768px) { .desc { grid-template-columns: 1fr; } }
    .desc__main { min-width: 0; }
    .desc__name { font-family: "GeogrotesqueCondBoldWeb", "Arial Black", Impact, sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.18px; color: #000; margin: 0 0 4px 0; }
    .desc__name code { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 11px; font-weight: 550; letter-spacing: .9px; background: #000; color: #fff; padding: 2px 6px; border-radius: 2px; margin-right: 8px; vertical-align: 1px; }
    .desc__body { font-family: "RingsideWideWeb", Helvetica, Arial, sans-serif; font-size: 14px; line-height: 1.5; color: #000; margin: 0; max-width: 90ch; }
    .desc__solves { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 11px; letter-spacing: .9px; text-transform: uppercase; color: #757575; margin-top: 6px; font-weight: 400; }
    .desc__solves strong { color: #000; font-family: "GeogrotesqueCondBoldWeb", "Arial Black", Impact, sans-serif; font-weight: 700; }
    .desc__tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-start; }
    .desc__tag { font-family: "BaseMonoWideWeb", Courier, "Courier New", sans-serif; font-size: 11px; letter-spacing: .8px; text-transform: uppercase; padding: 3px 7px; border: 1px solid #d0d0d0; border-radius: 2px; color: #000; white-space: nowrap; font-weight: 400; }

    .frame-wrap { flex: 1; overflow: hidden; background: #f8f8f8; }
    .frame { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <div class="toggle-wrap">
    <header class="toggle" role="tablist" aria-label="Shade picker variants">
      <span class="toggle__brand">Skin Twin <span>final 3 + alts</span></span>

      <button type="button" class="opt-btn" data-opt="option-m1.html" aria-pressed="true">M1<span class="opt-btn__sub">Baseline</span></button>
      <button type="button" class="opt-btn" data-opt="option-m2.html">M2<span class="opt-btn__sub">+ Look open</span></button>
      <button type="button" class="opt-btn" data-opt="option-m7.html">M7<span class="opt-btn__sub">+ Look accordion</span></button>

      <span class="opt-divider"></span>

      <button type="button" class="opt-btn" data-opt="option-m3.html">M3<span class="opt-btn__sub">Horizontal Look</span></button>
      <button type="button" class="opt-btn" data-opt="option-m5.html">M5<span class="opt-btn__sub">Hotspots</span></button>
      <button type="button" class="opt-btn" data-opt="option-m6.html">M6<span class="opt-btn__sub">Before / After</span></button>

      <span class="opt-divider"></span>

      <button type="button" class="opt-btn" data-opt="option-f.html">F<span class="opt-btn__sub">Full Swap</span></button>
      <button type="button" class="opt-btn" data-opt="option-g.html">G<span class="opt-btn__sub">Adaptive</span></button>
      <button type="button" class="opt-btn" data-opt="option-l.html">L<span class="opt-btn__sub">Compare 2</span></button>
      <button type="button" class="opt-btn" data-opt="option-q.html">Q<span class="opt-btn__sub">5×6 Reel</span></button>
      <button type="button" class="opt-btn" data-opt="option-r.html">R<span class="opt-btn__sub">One Row</span></button>
      <button type="button" class="opt-btn" data-opt="option-s.html">S<span class="opt-btn__sub">Stacked Rows</span></button>
    </header>
    <div class="desc">
      <div class="desc__main">
        <p class="desc__name" data-desc-name></p>
        <p class="desc__body" data-desc-body></p>
        <p class="desc__solves" data-desc-solves></p>
      </div>
      <div class="desc__tags" data-desc-tags></div>
    </div>
  </div>

  <div class="frame-wrap">
    <iframe class="frame" data-frame src="option-m1.html" title="Variant preview"></iframe>
  </div>

  <script>
    const variants = {
      "option-m1.html": {
        name: "Skin Twin — Baseline (final)",
        kicker: "M1",
        body: "All Wave 1+2+3 fixes applied. No sticky on the right column, hero sized so right panel matches grid height, shade name above undertone pill, JRB-spec .button (40px, content-width — not stretched), subtle hover preview on grid cells (shade name in the corner).",
        solves: "Cody's preferred direction · clean baseline · everything from Whitney's notes",
        tags: ["no swatch", "JRB .button spec", "hover preview", "heights match"]
      },
      "option-m2.html": {
        name: "Skin Twin — Look OPEN",
        kicker: "M2",
        body: "Same M1 baseline + 'See what else she's wearing' section visible by default — Miracle Balm, Lip Recharge, Face Pencil with their matching shades. Each item has its own Add button.",
        solves: "AOV booster + cross-product discovery, no extra clicks",
        tags: ["look visible", "AOV", "cross-product"]
      },
      "option-m7.html": {
        name: "Skin Twin — Look ACCORDION",
        kicker: "M7",
        body: "Same M1 baseline + 'See what else she's wearing' as a collapsed accordion — click to expand, click to close. Whitney's idea: keeps the right column tight (heights match grid) until shopper opts in.",
        solves: "Cross-product discovery without taking up space by default",
        tags: ["accordion", "Whitney's idea", "compact"]
      },
      "option-m3.html": {
        name: "Skin Twin — Horizontal Look",
        kicker: "M3",
        body: "Same no-swatch right panel as M1. Get-the-Look becomes a 4-product horizontal strip BELOW the layout (full width) — Foundation Stick featured in black, three cross-products on cream.",
        solves: "Magazine-spread feel · the look is its own moment, not a sidebar",
        tags: ["no swatch", "full-width look strip"]
      },
      "option-m5.html": {
        name: "Skin Twin — Shoppable Hotspots",
        kicker: "M5",
        body: "Small static dots (18px, no animation) on her cheek, lip, and eye. Tap a dot to open a beefy card with the product swatch, name, shade, Junip review stars, and a JRB-spec ATC. Plus 'Add the Whole Look · $138' as a secondary CTA.",
        solves: "Turns the photo itself into the shopping interface · every product is one tap from cart",
        tags: ["shoppable photo", "static hotspots", "stars + swatch"]
      },
      "option-m6.html": {
        name: "Skin Twin — Before / After",
        kicker: "M6",
        body: "Drag the handle on her photo to scrub between bare-skin reference and the foundation applied. Click anywhere on the image to jump the slider. Keyboard arrow keys nudge ±5%. Prototype uses a CSS filter for 'before'; production swaps in the actual reference shot.",
        solves: "Sells the shade by showing the actual transformation, not just a static face",
        tags: ["before/after slider", "drag + keyboard", "transformation"]
      },
      "option-f.html": {
        name: "Full Swap",
        kicker: "F",
        body: "30-grid stays put when you change category — only the swatch row updates. Pick a shade and the grid hard-cuts to a single model. Closest to Zoe's spec.",
        solves: "Validates the spec verbatim",
        tags: ["Zoe spec", "hard cut"]
      },
      "option-g.html": {
        name: "Adaptive Count",
        kicker: "G",
        body: "Click a category and the grid replaces with only those shades' models in a single cohesive row. Click a shade and the adaptive grid hard-cuts to a single model.",
        solves: "Cody's responsive-to-count idea",
        tags: ["adaptive", "single row"]
      },
      "option-l.html": {
        name: "Compare 2",
        kicker: "L",
        body: "Pick two shades — stage splits 50/50 with both models side-by-side, plus a one-line diff and matching arm swatches.",
        solves: "\"I'm in between colors\"",
        tags: ["side-by-side"]
      },
      "option-q.html": {
        name: "5×6 Reel · Merit",
        kicker: "Q",
        body: "30 cards in a 5×6 grid (Merit-style). Hover to see the shade swept across her cheek; click for the editorial modal.",
        solves: "Show all 30 in one view — but heavy",
        tags: ["5×6", "modal"]
      },
      "option-r.html": {
        name: "One Row",
        kicker: "R",
        body: "All 30 in a single horizontal row, ~5 visible at a time. Way less overwhelming than a wall of faces.",
        solves: "\"30 at once feels like a ton\"",
        tags: ["horizontal scroll"]
      },
      "option-s.html": {
        name: "Stacked Rows",
        kicker: "S",
        body: "Seven mini horizontal rows, one per skin-tone range. Each pre-labeled.",
        solves: "Decision fatigue — pre-categorize",
        tags: ["7 rows", "pre-labeled"]
      }
    };

    (function () {
      const buttons = Array.from(document.querySelectorAll(".opt-btn"));
      const frame = document.querySelector("[data-frame]");
      const descName = document.querySelector("[data-desc-name]");
      const descBody = document.querySelector("[data-desc-body]");
      const descSolves = document.querySelector("[data-desc-solves]");
      const descTags = document.querySelector("[data-desc-tags]");

      function activate(file, push = true) {
        buttons.forEach(b => b.setAttribute("aria-pressed", String(b.dataset.opt === file)));
        if (frame.getAttribute("src") !== file) frame.setAttribute("src", file);
        const v = variants[file];
        if (v) {
          descName.innerHTML = `<code>${v.kicker}</code>${v.name}`;
          descBody.textContent = v.body;
          descSolves.innerHTML = v.solves ? `<strong>Solves:</strong> ${v.solves}` : "";
          descTags.innerHTML = (v.tags || []).map(t => `<span class="desc__tag">${t}</span>`).join("");
        }
        if (push) {
          const hash = "#" + file.replace(".html", "").replace("option-", "");
          if (location.hash !== hash) history.replaceState(null, "", hash);
        }
      }

      buttons.forEach(b => b.addEventListener("click", () => activate(b.dataset.opt)));

      const hash = location.hash.replace("#", "");
      if (hash) {
        const candidate = "option-" + hash + ".html";
        if (buttons.some(b => b.dataset.opt === candidate)) activate(candidate, false);
      } else {
        activate("option-m1.html", false);
      }
    })();

    document.addEventListener('mousemove', function addMouse() {
      document.body.classList.add('has-mouse');
      document.removeEventListener('mousemove', addMouse);
    });
  </script>
</body>
</html>
