<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>FS Batch 2 — Review</title>
<style>
  :root {
    --bg: #0e0e10;
    --card: #18181b;
    --card-hover: #1e1e22;
    --ink: #fafafa;
    --muted: #8b8b94;
    --border: #2a2a30;
    --accent: #ff2e92;
    --love: #38b53e;
    --iterate: #d39527;
    --kill: #d33d3d;
    --record: #ff2e92;
    --shadow: 0 4px 16px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; overscroll-behavior: contain; }
  body { padding-bottom: env(safe-area-inset-bottom, 0); }
  header {
    position: sticky; top: 0; z-index: 100;
    padding: 14px 16px 12px;
    background: rgba(14,14,16,0.85);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
  }
  .head-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .progress {
    height: 3px; background: var(--border); border-radius: 999px; overflow: hidden;
    margin-top: 10px;
  }
  .progress > div { height: 100%; background: var(--accent); transition: width .25s ease; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .head-actions { display: flex; gap: 6px; }
  .btn {
    appearance: none; border: 1px solid var(--border); background: var(--card);
    color: var(--ink); padding: 7px 12px; border-radius: 8px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    -webkit-touch-callout: none; user-select: none;
  }
  .btn:hover { background: var(--card-hover); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .btn-primary:disabled { background: var(--border); border-color: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--muted); padding: 7px 8px; }

  .filter-bar {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 10px 16px 4px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    -webkit-overflow-scrolling: touch;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 999px;
    background: var(--card); border: 1px solid var(--border);
    font-size: 12px; white-space: nowrap; cursor: pointer;
    color: var(--muted);
  }
  .pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); font-weight: 600; }
  .pill em { font-style: normal; opacity: 0.6; font-size: 10px; }

  main { max-width: 720px; margin: 0 auto; padding: 14px 12px 100px; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 14px; overflow: hidden;
    transition: border-color .15s;
  }
  .card.rated-love { border-color: var(--love); }
  .card.rated-iterate { border-color: var(--iterate); }
  .card.rated-kill { border-color: var(--kill); opacity: 0.55; }

  .card-head {
    padding: 10px 14px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .card-num { font-family: ui-monospace, "SF Mono", monospace; font-size: 12px; color: var(--accent); font-weight: 700; }
  .card-meta { flex: 1; min-width: 0; }
  .card-arch { font-size: 12px; font-weight: 500; }
  .card-extras { display: flex; gap: 6px; margin-top: 2px; flex-wrap: wrap; }
  .chip { font-size: 9px; padding: 1px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.04em; background: var(--border); color: var(--muted); }
  .chip.shade { background: #2a2515; color: #d3a960; }
  .chip.persona { background: #18222e; color: #6da9d4; }

  .card-copy { padding: 10px 14px; background: rgba(0,0,0,0.2); }
  .copy-headline { font-size: 14px; font-weight: 600; line-height: 1.4; }
  .copy-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .copy-cta { font-size: 11px; color: var(--muted); margin-top: 6px; font-family: ui-monospace, "SF Mono", monospace; }

  .img-grid { display: grid; grid-template-columns: 1fr 9fr; gap: 0; padding: 10px; }
  .img-grid { grid-template-columns: 1fr 1fr; }
  .img-cell { position: relative; }
  .img-cell h4 { margin: 0 0 6px; font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .img-cell.sq img { aspect-ratio: 1/1; }
  .img-cell.vert img { aspect-ratio: 9/16; }
  .img-cell img { width: 100%; height: auto; object-fit: cover; display: block; border-radius: 6px; background: #000; cursor: zoom-in; }

  .actions { padding: 10px 14px; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid var(--border); }
  .ratings { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .rating-btn {
    appearance: none; border: 1px solid var(--border); background: var(--card);
    color: var(--ink); padding: 10px 6px; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .12s;
  }
  .rating-btn:active { transform: scale(0.97); }
  .rating-btn.r-love.active { background: var(--love); border-color: var(--love); color: #fff; }
  .rating-btn.r-iterate.active { background: var(--iterate); border-color: var(--iterate); color: #000; }
  .rating-btn.r-kill.active { background: var(--kill); border-color: var(--kill); color: #fff; }
  .rating-btn .label { font-size: 10px; font-weight: 500; opacity: 0.7; display: block; margin-top: 2px; }

  .voice {
    display: flex; align-items: center; gap: 8px;
    padding: 4px;
    background: var(--card-hover); border-radius: 8px;
  }
  .rec-btn {
    appearance: none; border: 0;
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--record); color: #fff;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .rec-btn.recording {
    background: #fff; color: var(--record);
    animation: pulse 1s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { box-shadow: 0 0 0 0 rgba(255,46,146,0.6); }
    to { box-shadow: 0 0 0 14px rgba(255,46,146,0); }
  }
  .rec-status { flex: 1; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .rec-time { font-family: ui-monospace, "SF Mono", monospace; font-size: 13px; color: var(--ink); }
  .rec-actions { display: flex; gap: 4px; }
  .rec-actions .btn { padding: 5px 10px; font-size: 11px; }
  .rec-audio { width: 100%; margin-top: 6px; }
  .rec-audio audio { width: 100%; height: 32px; }

  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.95);
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .lightbox-close { position: absolute; top: 20px; right: 20px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--bg); padding: 10px 18px;
    border-radius: 999px; font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow);
    opacity: 0; transition: opacity .25s;
    z-index: 200; pointer-events: none;
    max-width: calc(100vw - 32px);
  }
  .toast.show { opacity: 1; }

  .empty-state {
    text-align: center; color: var(--muted); padding: 40px 20px;
    font-size: 13px;
  }

  @media (min-width: 700px) {
    .img-grid { grid-template-columns: 1fr 9fr; padding: 12px; gap: 12px; }
    .ratings { grid-template-columns: repeat(3, 140px); justify-content: start; }
    .voice { padding: 6px; }
    .actions { padding: 12px 16px; }
  }
</style>
</head>

// ===== IndexedDB layer (stores ratings + audio blobs per concept) =====
const DB_NAME = 'fs-review';
const DB_VERSION = 1;
const STORE = 'reviews';

function openDb() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        db.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbGet(id) {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function dbPut(record) {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(record);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function dbAll() {
  const db = await openDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readonly');
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

const archetypes = [...new Set(MANIFEST.map(c => c.archetype))].sort();

let activeCardId = null;

function chipColor(label) {

async function renderCards() {
  const target = document.getElementById('cards');
  target.innerHTML = '';
  const reviews = Object.fromEntries((await dbAll()).map(r => [r.id, r]));
  const filtered = activeFilter === 'all' ? MANIFEST : MANIFEST.filter(c => c.archetype === activeFilter);
  if (filtered.length === 0) {
    target.innerHTML = '<div class="empty-state">No cards in this filter.</div>';
    return;
  }
  for (const c of filtered) {
    const r = reviews[c.id] || { id: c.id, rating: null, audioBlob: null };
    const div = document.createElement('div');
    div.className = 'card' + (r.rating ? ' rated-' + r.rating : '');
    div.dataset.id = c.id;

    const subhead = c.subhead ? `<div class="copy-sub">"${escapeHtml(c.subhead)}"</div>` : '';
    const shadeChip = c.shade ? `<span class="chip shade">${escapeHtml(c.shade)}</span>` : '';

    div.innerHTML = `
      <div class="card-head">
        <span class="card-num">${c.id.toUpperCase()}</span>
        <div class="card-meta">
          <div class="card-arch">${escapeHtml(c.archetype)}</div>
          <div class="card-extras">
            ${shadeChip}
            <span class="chip persona">${escapeHtml(c.persona)}</span>
          </div>
        </div>
      </div>
      <div class="card-copy">
        <div class="copy-headline">"${escapeHtml(c.headline)}"</div>
        ${subhead}
        <div class="copy-cta">CTA: ${escapeHtml(c.cta)}</div>
      </div>
      <div class="img-grid">
        <div class="img-cell sq">
          <h4>1×1</h4>
          ${c.urls['1x1'] ? `<img src="${c.urls['1x1']}" loading="lazy" onclick="openLightbox('${c.urls['1x1']}')">` : '<div class="empty-state" style="padding:20px">FAILED</div>'}
        </div>
        <div class="img-cell vert">
          <h4>9×16</h4>
          ${c.urls['9x16'] ? `<img src="${c.urls['9x16']}" loading="lazy" onclick="openLightbox('${c.urls['9x16']}')">` : '<div class="empty-state" style="padding:20px">FAILED</div>'}
        </div>
      </div>
      <div class="actions">
        <div class="ratings">
          <button class="rating-btn r-love ${r.rating === 'love' ? 'active' : ''}" data-rate="love" data-id="${c.id}">♥<span class="label">Love</span></button>
          <button class="rating-btn r-iterate ${r.rating === 'iterate' ? 'active' : ''}" data-rate="iterate" data-id="${c.id}">↻<span class="label">Iterate</span></button>
          <button class="rating-btn r-kill ${r.rating === 'kill' ? 'active' : ''}" data-rate="kill" data-id="${c.id}">✕<span class="label">Kill</span></button>
        </div>
        <div class="voice">
          <button class="rec-btn" data-id="${c.id}" title="Hold to record" aria-label="Record voice note">●</button>
          <div class="rec-status">
            <span class="rec-time" data-id="${c.id}">${r.audioBlob ? formatDuration(r.audioDuration || 0) : 'Tap to record'}</span>
          </div>
          <div class="rec-actions">
            ${r.audioBlob ? `<button class="btn" data-action="delete-audio" data-id="${c.id}">Delete</button>` : ''}
          </div>
        </div>
        ${r.audioBlob ? `<div class="rec-audio"><audio controls preload="metadata" data-id="${c.id}"></audio></div>` : ''}
      </div>`;
    target.appendChild(div);

    // wire audio playback (URL.createObjectURL needs the blob)
    if (r.audioBlob) {
      const audio = div.querySelector(`audio[data-id="${c.id}"]`);
      if (audio) audio.src = URL.createObjectURL(r.audioBlob);
    }
  }
  await refreshProgress();
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function refreshProgress() {
  const all = await dbAll();
  const rated = all.filter(r => r.rating).length;
  const counts = { love: 0, iterate: 0, kill: 0 };
  for (const r of all) {
    if (r.rating) counts[r.rating]++;
  }
  document.getElementById('progress-bar').style.width = (rated / MANIFEST.length * 100).toFixed(1) + '%';
  document.getElementById('progress-text').textContent = `${rated} / ${MANIFEST.length} reviewed`;
  document.getElementById('progress-counts').innerHTML =
    `<span style="color:var(--love)">♥ ${counts.love}</span> · ` +
    `<span style="color:var(--iterate)">↻ ${counts.iterate}</span> · ` +
    `<span style="color:var(--kill)">✕ ${counts.kill}</span>`;
  document.getElementById('btn-export').disabled = rated === 0 && all.every(r => !r.audioBlob);
}

function renderFilters() {
  const bar = document.getElementById('filter-bar');
  const counts = {};
  MANIFEST.forEach(c => { counts[c.archetype] = (counts[c.archetype] || 0) + 1; });
  bar.innerHTML = `<button class="pill ${activeFilter === 'all' ? 'active' : ''}" data-filter="all">All <em>${MANIFEST.length}</em></button>` +
    archetypes.map(a => `<button class="pill ${activeFilter === a ? 'active' : ''}" data-filter="${escapeHtml(a)}">${escapeHtml(a)} <em>${counts[a]}</em></button>`).join('');
}

// ===== Click handlers =====
document.addEventListener('click', async (e) => {
  // Filter pill
  const pill = e.target.closest('[data-filter]');
  if (pill) {
    activeFilter = pill.dataset.filter;
    renderFilters();
    renderCards();
    return;
  }
  // Rating button
  const rate = e.target.closest('[data-rate]');
  if (rate) {
    const id = rate.dataset.id;
    const rating = rate.dataset.rate;
    const existing = (await dbGet(id)) || { id };
    existing.rating = existing.rating === rating ? null : rating; // toggle
    existing.ratedAt = Date.now();
    await dbPut(existing);
    // update card class
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (card) {
      card.classList.remove('rated-love', 'rated-iterate', 'rated-kill');
      if (existing.rating) card.classList.add('rated-' + existing.rating);
      // update buttons
      card.querySelectorAll('.rating-btn').forEach(b => b.classList.toggle('active', b.dataset.rate === existing.rating));
    }
    refreshProgress();
    showToast(existing.rating ? `Rated ${id.toUpperCase()}: ${rating}` : `Rating cleared`);
    return;
  }
  // Delete audio
  const del = e.target.closest('[data-action="delete-audio"]');
  if (del) {
    const id = del.dataset.id;
    const existing = (await dbGet(id)) || { id };
    delete existing.audioBlob;
    delete existing.audioDuration;
    await dbPut(existing);
    showToast(`Audio deleted`);
    renderCards();
    return;
  }
  // Export
  if (e.target.id === 'btn-export') exportAll();
});

// ===== Voice recording (tap to start, tap to stop) =====
let activeRecorder = null;
let activeChunks = [];
let activeStartedAt = 0;
let activeId = null;
let activeTimer = null;

document.addEventListener('click', async (e) => {
  const btn = e.target.closest('.rec-btn');
  if (!btn) return;
  const id = btn.dataset.id;

  if (activeId === id) {
    // stop
    activeRecorder.stop();
    return;
  }
  if (activeId) {
    // stop another in flight
    activeRecorder.stop();
    await new Promise(r => setTimeout(r, 100));
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' :
                     MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
    activeRecorder = mimeType ? new MediaRecorder(stream, { mimeType, audioBitsPerSecond: 64000 }) : new MediaRecorder(stream);
    activeChunks = [];
    activeStartedAt = Date.now();
    activeId = id;
    activeRecorder.ondataavailable = (e) => { if (e.data.size > 0) activeChunks.push(e.data); };
    activeRecorder.onstop = async () => {
      const duration = Math.round((Date.now() - activeStartedAt) / 1000);
      const blob = new Blob(activeChunks, { type: activeRecorder.mimeType || 'audio/webm' });
      const existing = (await dbGet(id)) || { id };
      existing.audioBlob = blob;
      existing.audioDuration = duration;
      existing.recordedAt = Date.now();
      await dbPut(existing);
      stream.getTracks().forEach(t => t.stop());
      activeRecorder = null; activeId = null;
      clearInterval(activeTimer);
      btn.classList.remove('recording');
      const t = document.querySelector(`.rec-time[data-id="${id}"]`);
      if (t) t.textContent = formatDuration(duration);
      showToast(`Saved ${duration}s for ${id.toUpperCase()}`);
      renderCards();
    };
    activeRecorder.start();
    btn.classList.add('recording');
    activeTimer = setInterval(() => {
      const elapsed = Math.floor((Date.now() - activeStartedAt) / 1000);
      const t = document.querySelector(`.rec-time[data-id="${id}"]`);
      if (t) t.textContent = formatDuration(elapsed) + ' · recording…';
    }, 250);
  } catch (err) {
    showToast('Mic access denied — check browser permissions');
    console.error(err);
  }
});

function formatDuration(s) {
  const m = Math.floor(s / 60);
  const sec = String(s % 60).padStart(2, '0');
  return `${m}:${sec}`;
}

    return {
      id: c.id,
      archetype: c.archetype,
      headline: c.headline,
      subhead: c.subhead,
      cta: c.cta,
      persona: c.persona,
      shade: c.shade,
      urls: c.urls,
      rating: r.rating || null,
      ratedAt: r.ratedAt || null,
      audioDuration: r.audioDuration || null,
      audioBase64: null,
      audioMime: null,
      recordedAt: r.recordedAt || null,
    };
  });

  // Convert audio blobs to base64
  for (const c of concepts) {
    const r = reviews.find(x => x.id === c.id);
    if (r?.audioBlob) {
      c.audioBase64 = await blobToBase64(r.audioBlob);
      c.audioMime = r.audioBlob.type;
    }
  }

  const summary = {
    exportedAt: new Date().toISOString(),
    totalConcepts: MANIFEST.length,
    rated: concepts.filter(c => c.rating).length,
    counts: {
      love: concepts.filter(c => c.rating === 'love').length,
      iterate: concepts.filter(c => c.rating === 'iterate').length,
      kill: concepts.filter(c => c.rating === 'kill').length,
    },
    voiceNotes: concepts.filter(c => c.audioBase64).length,
    concepts,
  };

  const json = JSON.stringify(summary, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `fs-batch-2-review-${new Date().toISOString().slice(0,19).replace(/[:T]/g, '-')}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast(`Exported ${summary.rated} ratings · ${summary.voiceNotes} voice notes`);
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      const dataUrl = reader.result;
      const base64 = dataUrl.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ===== Keyboard shortcuts (desktop) =====
document.addEventListener('keydown', async (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (['1','2','3','r','R'].includes(e.key)) {
    // find the card most centered in viewport
    const cards = [...document.querySelectorAll('.card')];
    if (!cards.length) return;
    const center = window.innerHeight / 2;
    const closest = cards
      .map(c => ({ c, dist: Math.abs(c.getBoundingClientRect().top + c.offsetHeight / 2 - center) }))
      .sort((a, b) => a.dist - b.dist)[0]?.c;
    if (!closest) return;
    if (e.key === '1') closest.querySelector('.rating-btn.r-love')?.click();
    if (e.key === '2') closest.querySelector('.rating-btn.r-iterate')?.click();
    if (e.key === '3') closest.querySelector('.rating-btn.r-kill')?.click();
    if (e.key === 'r' || e.key === 'R') closest.querySelector('.rec-btn')?.click();
  }
});

// init
renderFilters();
renderCards();
</script>
