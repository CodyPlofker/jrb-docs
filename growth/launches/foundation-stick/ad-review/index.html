<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foundation Stick — Ad Review · Grid Mode</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { font-family: 'Inter', system-ui, sans-serif; background: #0d0d0e; color: #f0ede6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  /* TOP BAR */
  .topbar { background: #1a1a1c; border-bottom: 1px solid #2a2a2d; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; position: sticky; top: 0; z-index: 50; }
  .topbar .brand { font-family: 'Instrument Serif', Georgia, serif; font-size: 18px; letter-spacing: -0.2px; }
  .topbar .brand em { color: #c9a87c; font-style: italic; }
  .topbar .stats { display: flex; gap: 10px; font-size: 13px; flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: #232326; border-radius: 100px; }
  .stat .num { font-weight: 700; font-size: 14px; }
  .stat.approve .num { color: #6ec87e; }
  .stat.reject .num { color: #e8716a; }
  .stat.star .num { color: #f0c14b; }
  .stat.unrated .num { color: #8a8580; }
  .progress-bar { flex: 1; max-width: 240px; min-width: 120px; height: 6px; background: #2a2a2d; border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #c9a87c, #6ec87e); transition: width 0.3s; }

  /* FILTER BAR */
  .filter-bar { background: #16161a; border-bottom: 1px solid #2a2a2d; padding: 10px 28px; display: flex; gap: 12px; align-items: center; font-size: 12px; flex-wrap: wrap; position: sticky; top: 56px; z-index: 49; }
  .filter-bar label { color: #8a8580; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; font-size: 10px; }
  .filter-bar select { background: #232326; border: 1px solid #2a2a2d; color: #f0ede6; padding: 6px 10px; border-radius: 6px; font-family: inherit; font-size: 12px; cursor: pointer; max-width: 220px; }
  .filter-bar button { background: #232326; border: 1px solid #2a2a2d; color: #f0ede6; padding: 6px 12px; border-radius: 6px; font-family: inherit; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .filter-bar button:hover { background: #2a2a2d; }
  .filter-bar button.primary { background: #c9a87c; color: #0d0d0e; border-color: #c9a87c; font-weight: 600; }
  .filter-bar button.primary:hover { background: #d8b88c; }
  .pill-toggle { display: inline-flex; background: #232326; border: 1px solid #2a2a2d; border-radius: 100px; padding: 2px; gap: 0; }
  .pill-toggle button { background: transparent; border: 0; padding: 5px 12px; color: #8a8580; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; cursor: pointer; border-radius: 100px; transition: all 0.15s; }
  .pill-toggle button.active { background: #c9a87c; color: #0d0d0e; }
  .filter-bar .right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .filter-bar .count { color: #8a8580; font-size: 11px; }

  /* MAIN STAGE */
  main { flex: 1; padding: 24px 28px 60px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  @media (max-width: 720px) { main { padding: 16px 14px 60px; } .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; } }

  /* CARD */
  .card { background: #1a1a1c; border: 2px solid transparent; border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s; cursor: pointer; position: relative; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .card.approved { border-color: #6ec87e; }
  .card.rejected { border-color: #e8716a; opacity: 0.55; }
  .card.starred { border-color: #f0c14b; box-shadow: 0 0 0 1px #f0c14b inset; }
  .card.starred.approved { border-color: #f0c14b; }

  .card-image { background: #0a0a0b; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .card-image img { width: 100%; height: 100%; object-fit: contain; display: block; background: #0a0a0b; }
  .card-image.fmt-9x16 img { object-fit: contain; }
  .format-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); color: #fff; font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 3px 7px; border-radius: 100px; }
  .toolkit-badge { position: absolute; top: 8px; right: 8px; background: rgba(201,168,124,0.85); color: #0d0d0e; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; padding: 3px 7px; border-radius: 100px; max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .verdict-icon { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; backdrop-filter: blur(6px); }
  .verdict-icon.approved { background: rgba(110,200,126,0.92); color: #0d0d0e; }
  .verdict-icon.rejected { background: rgba(232,113,106,0.92); color: #fff; }
  .verdict-icon.starred { background: rgba(240,193,75,0.92); color: #0d0d0e; }

  .card-meta { padding: 10px 12px 12px; background: #16161a; border-top: 1px solid #2a2a2d; }
  .card-meta .archetype { font-size: 9px; color: #c9a87c; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 4px; }
  .card-meta .headline { font-family: 'Instrument Serif', Georgia, serif; font-size: 14px; font-style: italic; line-height: 1.3; color: #f0ede6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .card-actions { display: flex; gap: 6px; padding: 8px 10px 10px; background: #16161a; border-top: 1px solid #2a2a2d; }
  .card-actions button { flex: 1; background: #232326; border: 1px solid #2a2a2d; color: #8a8580; padding: 7px 0; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.12s; font-family: inherit; }
  .card-actions button:hover { background: #2a2a2d; transform: translateY(-1px); }
  .card-actions button.active.approve { background: #6ec87e; color: #0d0d0e; border-color: #6ec87e; }
  .card-actions button.active.reject { background: #e8716a; color: #fff; border-color: #e8716a; }
  .card-actions button.active.star { background: #f0c14b; color: #0d0d0e; border-color: #f0c14b; }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(5,5,6,0.97); z-index: 100; align-items: stretch; padding: 0; }
  .lightbox.active { display: flex; }
  .lb-image-wrap { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; padding: 28px; position: relative; }
  .lb-image-wrap img { max-width: 100%; max-height: calc(100vh - 56px); object-fit: contain; box-shadow: 0 30px 80px rgba(0,0,0,0.8); border-radius: 6px; }
  .lb-side { width: 380px; max-width: 38%; padding: 28px 28px 28px 0; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
  .lb-side .pill-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .lb-side .pill { background: #232326; padding: 4px 10px; border-radius: 100px; color: #c9a87c; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; font-size: 9px; }
  .lb-side .headline { font-family: 'Instrument Serif', Georgia, serif; font-size: 24px; font-style: italic; line-height: 1.25; color: #f0ede6; }
  .lb-side .label { font-size: 10px; color: #6a6560; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
  .lb-side .body { font-size: 13px; color: #b0a99f; line-height: 1.5; }
  .lb-side .actions { display: flex; gap: 8px; margin-top: auto; padding-top: 20px; border-top: 1px solid #2a2a2d; }
  .lb-side .actions button { flex: 1; padding: 12px 0; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #2a2a2d; background: #232326; color: #f0ede6; transition: all 0.15s; font-family: inherit; }
  .lb-side .actions button:hover { transform: translateY(-1px); }
  .lb-side .actions button.active.approve { background: #6ec87e; color: #0d0d0e; border-color: #6ec87e; }
  .lb-side .actions button.active.reject { background: #e8716a; color: #fff; border-color: #e8716a; }
  .lb-side .actions button.active.star { background: #f0c14b; color: #0d0d0e; border-color: #f0c14b; }
  .lb-close { position: absolute; top: 16px; right: 16px; width: 36px; height: 36px; border-radius: 50%; background: rgba(35,35,38,0.85); border: 1px solid #2a2a2d; color: #f0ede6; font-size: 18px; cursor: pointer; backdrop-filter: blur(8px); z-index: 102; }
  .lb-close:hover { background: #2a2a2d; }
  .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; border-radius: 50%; background: rgba(35,35,38,0.85); border: 1px solid #2a2a2d; color: #f0ede6; font-size: 22px; cursor: pointer; backdrop-filter: blur(8px); z-index: 102; }
  .lb-nav.prev { left: 16px; }
  .lb-nav.next { right: calc(38% + 16px); }
  .lb-nav:hover { background: #2a2a2d; }
  .lb-counter { position: absolute; bottom: 16px; left: 16px; background: rgba(35,35,38,0.85); border: 1px solid #2a2a2d; padding: 6px 12px; border-radius: 100px; font-size: 12px; color: #8a8580; backdrop-filter: blur(8px); z-index: 102; }
  @media (max-width: 720px) {
    .lightbox { flex-direction: column; }
    .lb-image-wrap { padding: 14px; }
    .lb-image-wrap img { max-height: 50vh; }
    .lb-side { width: 100%; max-width: 100%; padding: 14px; }
    .lb-nav.next { right: 16px; }
  }

  /* EMPTY STATE */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 32px; text-align: center; min-height: 50vh; }
  .empty-state h2 { font-family: 'Instrument Serif', Georgia, serif; font-size: 36px; font-style: italic; color: #c9a87c; margin-bottom: 16px; }
  .empty-state p { color: #8a8580; font-size: 14px; line-height: 1.6; max-width: 480px; }

  /* Hotkeys hint at bottom */
  .hotkey-hint { text-align: center; padding: 14px 16px 24px; font-size: 11px; color: #5a5652; letter-spacing: 0.5px; }
  .hotkey-hint kbd { background: #232326; border: 1px solid #2a2a2d; padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #c9a87c; margin: 0 3px; font-size: 10px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Foundation Stick · <em>Grid Review</em></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="stats">
    <div class="stat approve">✓ <span class="num" id="count-approve">0</span></div>
    <div class="stat reject">✗ <span class="num" id="count-reject">0</span></div>
    <div class="stat star">★ <span class="num" id="count-star">0</span></div>
    <div class="stat unrated">· <span class="num" id="count-unrated">0</span></div>
  </div>
</div>

<div class="filter-bar">
  <label>Toolkit</label>
  <select id="filter-toolkit"><option value="">All</option></select>
  <label>Format</label>
  <select id="filter-format">
    <option value="">All</option>
    <option value="1x1">1×1</option>
    <option value="9x16">9×16</option>
  </select>
  <label>Archetype</label>
  <select id="filter-archetype"><option value="">All</option></select>
  <div class="pill-toggle" id="filter-status">
    <button data-val="" class="active">All</button>
    <button data-val="unrated">Unrated</button>
    <button data-val="approved">✓</button>
    <button data-val="starred">★</button>
    <button data-val="rejected">✗</button>
  </div>
  <div class="right">
    <span class="count" id="visible-count">— ads</span>
    <button id="export-csv">Export CSV</button>
    <button id="reset-verdicts">Reset</button>
  </div>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="empty-state" style="display:none;">
    <h2>No ads match these filters.</h2>
    <p>Try clearing one of the filters above, or switch the status to "All".</p>
  </div>
</main>

<div class="hotkey-hint">
  Click an ad to enlarge. In lightbox: <kbd>←</kbd> prev · <kbd>→</kbd> next · <kbd>A</kbd> approve · <kbd>R</kbd> reject · <kbd>S</kbd> star · <kbd>Esc</kbd> close
</div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">×</button>
  <button class="lb-nav prev" id="lb-prev">‹</button>
  <button class="lb-nav next" id="lb-next">›</button>
  <div class="lb-image-wrap"><img id="lb-img" alt=""></div>
  <div class="lb-side">
    <div class="pill-row" id="lb-pills"></div>
    <div class="headline" id="lb-headline"></div>
    <div>
      <div class="label">Persona / strategy</div>
      <div class="body" id="lb-persona"></div>
    </div>
    <div>
      <div class="label">Subhead</div>
      <div class="body" id="lb-subhead">—</div>
    </div>
    <div>
      <div class="label">Asset ID</div>
      <div class="body" id="lb-id" style="font-family:monospace;font-size:11px;"></div>
    </div>
    <div class="actions">
      <button data-action="reject" id="lb-reject">✗ Reject</button>
      <button data-action="star" id="lb-star">★ Star</button>
      <button data-action="approve" id="lb-approve">✓ Approve</button>
    </div>
  </div>
  <div class="lb-counter" id="lb-counter">1 / 1</div>
</div>

<script>
(() => {
  const STORAGE_KEY = 'jrb-fs-grid-verdicts-v1';
  const dataEl = document.getElementById('ads-data');
  let data;
  try { data = JSON.parse(dataEl.textContent); } catch { data = { ads: [] }; }
  const ads = data.ads || [];

  let verdicts = {};
  try { verdicts = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { verdicts = {}; }

  let filterState = { toolkit: '', format: '', archetype: '', status: '' };
  let visibleAds = [];
  let lightboxIdx = -1;

  // Populate dropdowns
  const toolkitSet = [...new Set(ads.map(a => a.toolkit))].sort();
  const archetypeSet = [...new Set(ads.map(a => a.archetype).filter(Boolean))].sort();
  const tkSel = document.getElementById('filter-toolkit');
  toolkitSet.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; tkSel.appendChild(o); });
  const arSel = document.getElementById('filter-archetype');
  archetypeSet.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; arSel.appendChild(o); });

  function saveVerdicts() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(verdicts));
  }

  function getVerdict(id) {
    return verdicts[id] || { verdict: null, starred: false, ts: null };
  }

  function setVerdict(id, action) {
    const cur = getVerdict(id);
    const next = { ...cur, ts: new Date().toISOString() };
    if (action === 'approve') next.verdict = (cur.verdict === 'approve') ? null : 'approve';
    else if (action === 'reject') next.verdict = (cur.verdict === 'reject') ? null : 'reject';
    else if (action === 'star') next.starred = !cur.starred;
    if (!next.verdict && !next.starred) delete verdicts[id];
    else verdicts[id] = next;
    saveVerdicts();
    updateCounters();
    refreshCard(id);
    if (lightboxIdx >= 0 && visibleAds[lightboxIdx]?.id === id) updateLightboxButtons(id);
  }

  function classifyVerdict(id) {
    const v = getVerdict(id);
    if (v.verdict === 'approve' && v.starred) return 'starred';
    if (v.verdict === 'approve') return 'approved';
    if (v.verdict === 'reject') return 'rejected';
    if (v.starred) return 'starred';
    return 'unrated';
  }

  function applyFilter(a) {
    if (filterState.toolkit && a.toolkit !== filterState.toolkit) return false;
    if (filterState.format && a.format !== filterState.format) return false;
    if (filterState.archetype && a.archetype !== filterState.archetype) return false;
    if (filterState.status) {
      const c = classifyVerdict(a.id);
      if (filterState.status !== c) return false;
    }
    return true;
  }

  function buildCard(a) {
    const v = getVerdict(a.id);
    const cls = classifyVerdict(a.id);
    const card = document.createElement('div');
    card.className = `card ${cls === 'unrated' ? '' : cls}`;
    card.dataset.id = a.id;
    card.innerHTML = `
      <div class="card-image fmt-${a.format}">
        <img src="${a.url}" alt="${(a.headline || '').replace(/"/g,'&quot;')}" loading="lazy">
        <div class="format-badge">${a.format}</div>
        ${cls === 'unrated' ? `<div class="toolkit-badge">${a.toolkit_short || ''}</div>` : `<div class="verdict-icon ${cls}">${cls==='approved'?'✓':cls==='rejected'?'✗':'★'}</div>`}
      </div>
      <div class="card-meta">
        <div class="archetype">${a.archetype || ''}</div>
        <div class="headline">${a.headline || ''}</div>
      </div>
      <div class="card-actions">
        <button data-action="reject" class="${v.verdict==='reject'?'active reject':''}" title="Reject">✗</button>
        <button data-action="star" class="${v.starred?'active star':''}" title="Star">★</button>
        <button data-action="approve" class="${v.verdict==='approve'?'active approve':''}" title="Approve">✓</button>
      </div>
    `;
    card.querySelector('.card-image').addEventListener('click', (e) => {
      e.stopPropagation();
      openLightbox(visibleAds.findIndex(x => x.id === a.id));
    });
    card.querySelectorAll('.card-actions button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        setVerdict(a.id, btn.dataset.action);
      });
    });
    return card;
  }

  function refreshCard(id) {
    const card = document.querySelector(`.card[data-id="${CSS.escape(id)}"]`);
    if (!card) return;
    const a = ads.find(x => x.id === id);
    if (!a) return;
    const updated = buildCard(a);
    card.replaceWith(updated);
  }

  function render() {
    visibleAds = ads.filter(applyFilter);
    document.getElementById('visible-count').textContent = `${visibleAds.length} of ${ads.length} ads`;
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    visibleAds.forEach(a => grid.appendChild(buildCard(a)));
    document.getElementById('empty-state').style.display = visibleAds.length === 0 ? 'flex' : 'none';
  }

  function updateCounters() {
    let approve = 0, reject = 0, star = 0;
    Object.values(verdicts).forEach(v => {
      if (v.verdict === 'approve') approve++;
      if (v.verdict === 'reject') reject++;
      if (v.starred) star++;
    });
    const unrated = ads.length - approve - reject;
    document.getElementById('count-approve').textContent = approve;
    document.getElementById('count-reject').textContent = reject;
    document.getElementById('count-star').textContent = star;
    document.getElementById('count-unrated').textContent = unrated;
    const reviewed = approve + reject;
    document.getElementById('progress-fill').style.width = ads.length ? `${(reviewed / ads.length) * 100}%` : '0%';
  }

  // LIGHTBOX
  function openLightbox(idx) {
    if (idx < 0 || idx >= visibleAds.length) return;
    lightboxIdx = idx;
    const a = visibleAds[idx];
    document.getElementById('lb-img').src = a.url;
    document.getElementById('lb-img').alt = a.headline || '';
    document.getElementById('lb-pills').innerHTML = `
      <span class="pill">${a.format}</span>
      <span class="pill">${a.toolkit_short || ''}</span>
      <span class="pill">${a.archetype || ''}</span>
    `;
    document.getElementById('lb-headline').textContent = a.headline || '—';
    document.getElementById('lb-persona').textContent = a.persona || '—';
    document.getElementById('lb-subhead').textContent = a.subhead || '—';
    document.getElementById('lb-id').textContent = a.id;
    document.getElementById('lb-counter').textContent = `${idx + 1} / ${visibleAds.length}`;
    updateLightboxButtons(a.id);
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
    lightboxIdx = -1;
  }

  function navLightbox(delta) {
    if (lightboxIdx < 0) return;
    const next = lightboxIdx + delta;
    if (next >= 0 && next < visibleAds.length) openLightbox(next);
  }

  function updateLightboxButtons(id) {
    const v = getVerdict(id);
    const ap = document.getElementById('lb-approve');
    const rj = document.getElementById('lb-reject');
    const st = document.getElementById('lb-star');
    ap.className = v.verdict === 'approve' ? 'active approve' : '';
    rj.className = v.verdict === 'reject' ? 'active reject' : '';
    st.className = v.starred ? 'active star' : '';
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => navLightbox(-1));
  document.getElementById('lb-next').addEventListener('click', () => navLightbox(1));
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target.id === 'lightbox') closeLightbox();
  });
  ['lb-approve','lb-reject','lb-star'].forEach(btnId => {
    document.getElementById(btnId).addEventListener('click', () => {
      if (lightboxIdx < 0) return;
      const action = document.getElementById(btnId).dataset.action;
      setVerdict(visibleAds[lightboxIdx].id, action);
    });
  });

  document.addEventListener('keydown', (e) => {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowLeft') navLightbox(-1);
    else if (e.key === 'ArrowRight') navLightbox(1);
    else if (e.key === 'a' || e.key === 'A') { setVerdict(visibleAds[lightboxIdx].id, 'approve'); }
    else if (e.key === 'r' || e.key === 'R') { setVerdict(visibleAds[lightboxIdx].id, 'reject'); }
    else if (e.key === 's' || e.key === 'S') { setVerdict(visibleAds[lightboxIdx].id, 'star'); }
  });

  // FILTERS
  ['filter-toolkit','filter-format','filter-archetype'].forEach(id => {
    document.getElementById(id).addEventListener('change', (e) => {
      const key = id.replace('filter-','');
      filterState[key] = e.target.value;
      render();
    });
  });
  document.querySelectorAll('#filter-status button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#filter-status button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterState.status = btn.dataset.val;
      render();
    });
  });

  // CSV EXPORT
  document.getElementById('export-csv').addEventListener('click', () => {
    const rows = [['id','url','format','toolkit','archetype','headline','verdict','starred','timestamp']];
    ads.forEach(a => {
      const v = getVerdict(a.id);
      if (!v.verdict && !v.starred) return;
      const safe = (s) => `"${String(s ?? '').replace(/"/g,'""')}"`;
      rows.push([
        safe(a.id),
        safe(a.url),
        safe(a.format),
        safe(a.toolkit),
        safe(a.archetype),
        safe(a.headline),
        safe(v.verdict || ''),
        safe(v.starred ? '1' : '0'),
        safe(v.ts || ''),
      ]);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `fs-ad-verdicts-${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('reset-verdicts').addEventListener('click', () => {
    if (!confirm('Clear ALL verdicts? This can\'t be undone.')) return;
    verdicts = {};
    saveVerdicts();
    updateCounters();
    render();
  });

  // INIT
  updateCounters();
  render();
})();
</script>

</body>
</html>
