<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foundation Stick — Ad Review · Swipe Mode</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { font-family: 'Inter', system-ui, sans-serif; background: #0d0d0e; color: #f0ede6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

  /* TOP BAR */
  .topbar { background: #1a1a1c; border-bottom: 1px solid #2a2a2d; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .topbar .brand { font-family: 'Instrument Serif', Georgia, serif; font-size: 18px; letter-spacing: -0.2px; }
  .topbar .brand em { color: #c9a87c; font-style: italic; }
  .topbar .stats { display: flex; gap: 18px; font-size: 13px; }
  .stat { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: #232326; border-radius: 100px; }
  .stat .num { font-weight: 700; font-size: 14px; }
  .stat.approve .num { color: #6ec87e; }
  .stat.reject .num { color: #e8716a; }
  .stat.star .num { color: #f0c14b; }
  .stat.skip .num { color: #8a8580; }
  .progress-bar { flex: 1; max-width: 320px; height: 6px; background: #2a2a2d; border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #c9a87c, #6ec87e); transition: width 0.3s; }

  /* FILTER BAR */
  .filter-bar { background: #16161a; border-bottom: 1px solid #2a2a2d; padding: 10px 28px; display: flex; gap: 12px; align-items: center; font-size: 12px; flex-wrap: wrap; }
  .filter-bar label { color: #8a8580; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; font-size: 10px; }
  .filter-bar select { background: #232326; border: 1px solid #2a2a2d; color: #f0ede6; padding: 6px 10px; border-radius: 6px; font-family: inherit; font-size: 12px; cursor: pointer; }
  .filter-bar button { background: #232326; border: 1px solid #2a2a2d; color: #f0ede6; padding: 6px 12px; border-radius: 6px; font-family: inherit; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .filter-bar button:hover { background: #2a2a2d; }
  .filter-bar button.primary { background: #c9a87c; color: #0d0d0e; border-color: #c9a87c; font-weight: 600; }
  .filter-bar button.primary:hover { background: #d8b88c; }

  /* MAIN STAGE */
  .stage { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px; position: relative; }

  /* CARD STACK */
  .card-stack { position: relative; width: 100%; max-width: 540px; aspect-ratio: 1 / 1.5; }
  .card { position: absolute; inset: 0; background: #1a1a1c; border: 1px solid #2a2a2d; border-radius: 18px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.5); display: flex; flex-direction: column; transition: transform 0.3s, opacity 0.3s; }
  .card.behind-1 { transform: scale(0.96) translateY(12px); opacity: 0.7; z-index: 1; }
  .card.behind-2 { transform: scale(0.92) translateY(24px); opacity: 0.45; z-index: 0; }
  .card.swipe-left { transform: translateX(-120%) rotate(-15deg); opacity: 0; }
  .card.swipe-right { transform: translateX(120%) rotate(15deg); opacity: 0; }
  .card.swipe-up { transform: translateY(-120%) scale(1.05); opacity: 0; }
  .card-image { flex: 1; background: #2a2a2d; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .card-image img { width: 100%; height: 100%; object-fit: contain; background: #0a0a0b; }
  .card-image .placeholder { color: #5a5652; text-align: center; padding: 40px; }
  .card-image .placeholder .spin { display: inline-block; width: 32px; height: 32px; border: 3px solid #3a3a3d; border-top-color: #c9a87c; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .card-image .format-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); color: #fff; font-size: 10px; font-weight: 600; letter-spacing: 1px; padding: 4px 8px; border-radius: 4px; }
  .card-meta { padding: 14px 18px; background: #16161a; border-top: 1px solid #2a2a2d; }
  .card-meta .row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px; font-size: 11px; color: #8a8580; }
  .card-meta .row .pill { background: #2a2a2d; padding: 2px 8px; border-radius: 100px; color: #c9a87c; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; font-size: 9px; }
  .card-meta .headline { font-family: 'Instrument Serif', Georgia, serif; font-size: 17px; font-style: italic; line-height: 1.3; color: #f0ede6; margin-top: 6px; }
  .card-meta .persona { font-size: 11px; color: #6a6560; margin-top: 4px; }

  /* SWIPE HINT OVERLAYS */
  .swipe-hint { position: absolute; top: 50%; transform: translateY(-50%); font-family: 'Instrument Serif', Georgia, serif; font-size: 56px; font-style: italic; opacity: 0; transition: opacity 0.15s; pointer-events: none; padding: 14px 28px; border-radius: 12px; }
  .swipe-hint.left { left: 24px; color: #e8716a; border: 3px solid #e8716a; transform: translateY(-50%) rotate(-12deg); }
  .swipe-hint.right { right: 24px; color: #6ec87e; border: 3px solid #6ec87e; transform: translateY(-50%) rotate(12deg); }
  .swipe-hint.up { top: 24px; left: 50%; transform: translateX(-50%) scale(0.9); color: #f0c14b; border: 3px solid #f0c14b; font-size: 36px; }
  .card-stack[data-swipe="left"] .swipe-hint.left, .card-stack[data-swipe="right"] .swipe-hint.right, .card-stack[data-swipe="up"] .swipe-hint.up { opacity: 1; }

  /* ACTIONS */
  .actions { display: flex; gap: 18px; justify-content: center; padding: 24px 16px 32px; }
  .action-btn { width: 64px; height: 64px; border-radius: 50%; border: 2px solid; background: #1a1a1c; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; transition: transform 0.15s, background 0.15s; font-family: inherit; }
  .action-btn:hover { transform: translateY(-3px); }
  .action-btn:active { transform: scale(0.95); }
  .action-btn.reject { border-color: #e8716a; color: #e8716a; }
  .action-btn.reject:hover { background: #e8716a22; }
  .action-btn.star { border-color: #f0c14b; color: #f0c14b; width: 56px; height: 56px; font-size: 22px; }
  .action-btn.star:hover { background: #f0c14b22; }
  .action-btn.skip { border-color: #5a5652; color: #8a8580; width: 56px; height: 56px; font-size: 22px; }
  .action-btn.skip:hover { background: #5a565222; }
  .action-btn.approve { border-color: #6ec87e; color: #6ec87e; }
  .action-btn.approve:hover { background: #6ec87e22; }

  /* HOTKEYS HINT */
  .hotkeys { text-align: center; padding: 0 16px 24px; font-size: 11px; color: #5a5652; letter-spacing: 0.5px; }
  .hotkeys kbd { background: #232326; border: 1px solid #2a2a2d; padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #c9a87c; margin: 0 3px; font-size: 10px; }

  /* END SCREEN */
  .end-screen { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 60px 32px; text-align: center; max-width: 720px; margin: 0 auto; flex: 1; }
  .end-screen.active { display: flex; }
  .end-screen h2 { font-family: 'Instrument Serif', Georgia, serif; font-size: 56px; font-style: italic; margin-bottom: 16px; color: #c9a87c; }
  .end-screen p { color: #8a8580; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
  .end-screen .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 24px 0 32px; width: 100%; }
  .summary-card { background: #1a1a1c; border: 1px solid #2a2a2d; border-radius: 12px; padding: 20px 16px; text-align: center; }
  .summary-card .num { font-size: 32px; font-weight: 700; font-family: 'Instrument Serif', Georgia, serif; font-style: italic; }
  .summary-card.approve .num { color: #6ec87e; }
  .summary-card.reject .num { color: #e8716a; }
  .summary-card.star .num { color: #f0c14b; }
  .summary-card.skip .num { color: #8a8580; }
  .summary-card .label { font-size: 11px; color: #8a8580; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; margin-top: 4px; }
  .end-screen .end-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .end-screen button { background: #c9a87c; color: #0d0d0e; border: 0; padding: 12px 24px; border-radius: 8px; font-family: inherit; font-weight: 600; font-size: 14px; cursor: pointer; }
  .end-screen button.secondary { background: #232326; color: #f0ede6; border: 1px solid #2a2a2d; }
  .end-screen button:hover { opacity: 0.9; }

  /* APPROVED GRID (after end-screen) */
  .approved-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 24px; }
  .approved-card { background: #1a1a1c; border: 1px solid #2a2a2d; border-radius: 8px; overflow: hidden; }
  .approved-card img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #0a0a0b; display: block; }
  .approved-card .approved-meta { padding: 8px 10px; font-size: 11px; color: #8a8580; }
  .approved-card .approved-meta strong { color: #f0ede6; font-weight: 500; }

  /* EMPTY STATE */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 32px; text-align: center; flex: 1; }
  .empty-state h2 { font-family: 'Instrument Serif', Georgia, serif; font-size: 36px; font-style: italic; color: #c9a87c; margin-bottom: 16px; }
  .empty-state p { color: #8a8580; font-size: 14px; line-height: 1.6; max-width: 480px; margin-bottom: 8px; }
  .empty-state .live-status { background: #1a1a1c; border: 1px solid #2a2a2d; border-radius: 12px; padding: 24px; margin-top: 24px; min-width: 360px; }
  .empty-state .live-status .num { font-family: 'Instrument Serif', Georgia, serif; font-size: 48px; font-style: italic; color: #c9a87c; }
  .empty-state .live-status .label { font-size: 11px; color: #8a8580; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
  .empty-state .toolkits { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 16px; font-size: 11px; text-align: left; }
  .empty-state .toolkits div { padding: 4px 8px; background: #232326; border-radius: 4px; color: #8a8580; }
  .empty-state .toolkits div b { color: #f0ede6; }

  @media (max-width: 720px) {
    .topbar { padding: 12px 16px; gap: 12px; }
    .stage { padding: 16px; }
    .card-stack { aspect-ratio: 1 / 1.4; }
    .end-screen .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .empty-state .live-status { min-width: 280px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Foundation Stick · <em>Ad Review</em></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width: 0%"></div></div>
  <div class="stats">
    <div class="stat approve">✓ <span class="num" id="stat-approve">0</span></div>
    <div class="stat star">★ <span class="num" id="stat-star">0</span></div>
    <div class="stat skip">⤳ <span class="num" id="stat-skip">0</span></div>
    <div class="stat reject">✗ <span class="num" id="stat-reject">0</span></div>
  </div>
</div>

<div class="filter-bar">
  <label>Filter</label>
  <select id="filter-toolkit"><option value="">All toolkits</option></select>
  <select id="filter-format"><option value="">Both formats</option><option value="1x1">1×1 only</option><option value="9x16">9×16 only</option></select>
  <select id="filter-archetype"><option value="">All archetypes</option></select>
  <button onclick="resetReviews()" id="reset-btn">Reset reviews</button>
  <button onclick="exportCSV()" class="primary" id="export-btn">Export approved (CSV)</button>
  <button onclick="showEndScreen()" id="finish-btn">Finish review →</button>
</div>

<div class="stage" id="stage">
  <div class="empty-state" id="empty-state">
    <h2 id="empty-title">Loading…</h2>
    <p id="empty-msg">Fetching ad data from the engine.</p>
    <div class="live-status" id="live-status" style="display:none;">
      <div class="num" id="live-done">0</div>
      <div class="label">of <span id="live-total">192</span> ads ready</div>
      <div class="toolkits" id="live-toolkits"></div>
    </div>
  </div>

  <div class="card-stack" id="card-stack" style="display:none;">
    <div class="swipe-hint left">REJECT</div>
    <div class="swipe-hint up">★ STAR</div>
    <div class="swipe-hint right">APPROVE</div>
  </div>

  <div class="end-screen" id="end-screen">
    <h2>You're done.</h2>
    <p>Reviewed all <span id="end-total">0</span> ads. Here's the breakdown.</p>
    <div class="summary-grid">
      <div class="summary-card approve"><div class="num" id="end-approve">0</div><div class="label">Approved</div></div>
      <div class="summary-card star"><div class="num" id="end-star">0</div><div class="label">Starred</div></div>
      <div class="summary-card skip"><div class="num" id="end-skip">0</div><div class="label">Skipped</div></div>
      <div class="summary-card reject"><div class="num" id="end-reject">0</div><div class="label">Rejected</div></div>
    </div>
    <div class="end-actions">
      <button onclick="exportCSV()">Export approved (CSV)</button>
      <button onclick="exportJSON()" class="secondary">Export full JSON</button>
      <button onclick="reopenReview()" class="secondary">Re-open review</button>
    </div>
    <div class="approved-grid" id="approved-grid"></div>
  </div>
</div>

<div class="actions" id="actions" style="display:none;">
  <button class="action-btn reject" onclick="rate('reject')" title="Reject (←)">✗</button>
  <button class="action-btn skip" onclick="rate('skip')" title="Skip (↓)">⤳</button>
  <button class="action-btn star" onclick="rate('star')" title="Star (↑)">★</button>
  <button class="action-btn approve" onclick="rate('approve')" title="Approve (→)">✓</button>
</div>

<div class="hotkeys" id="hotkeys" style="display:none;">
  Keys: <kbd>←</kbd> reject <kbd>↑</kbd> star <kbd>↓</kbd> skip <kbd>→</kbd> approve <kbd>U</kbd> undo <kbd>F</kbd> finish
</div>

function saveReviews() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(reviews));
}

function init() {
  loadReviews();
  const dataEl = document.getElementById('ads-data');
  let data;
  try { data = JSON.parse(dataEl.textContent); } catch { data = { ads: [] }; }
  ads = data.ads || [];

  if (!ads.length) {
    showEmptyState(data);
    return;
  }

  populateFilters();
  document.getElementById('card-stack').style.display = 'block';
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('hotkeys').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';

  // Skip already-reviewed ads
  while (idx < ads.length && reviews[ads[idx].id]) idx++;
  render();
  updateStats();
}

function showEmptyState(data) {
  const totalTarget = data.totalTarget || 192;
  const liveDone = data.liveDone || 0;
  const toolkits = data.toolkits || [];

  document.getElementById('empty-title').textContent = liveDone === 0 ? 'Generation in progress…' : 'Some ads ready, more coming…';
  document.getElementById('empty-msg').textContent = liveDone === 0 ? 'The engine is generating 200 static ads. This page will populate when generation completes.' : `${liveDone} ads done so far. Refresh this page when generation finishes to start reviewing.`;

  if (data.liveStatus) {
    const statusEl = document.getElementById('live-status');
    statusEl.style.display = 'block';
    document.getElementById('live-done').textContent = liveDone;
    document.getElementById('live-total').textContent = totalTarget;
    const tkEl = document.getElementById('live-toolkits');
    tkEl.innerHTML = toolkits.map((t, i) => `<div>T${i+1}: <b>${t.done}/${t.total}</b> · ${t.label}</div>`).join('');
  }
}

function populateFilters() {
  const tkSel = document.getElementById('filter-toolkit');
  const archSel = document.getElementById('filter-archetype');
  const tks = [...new Set(ads.map(a => a.toolkit))].sort();
  const archs = [...new Set(ads.map(a => a.archetype))].sort();
  tks.forEach(t => tkSel.add(new Option(t, t)));
  archs.forEach(a => archSel.add(new Option(a, a)));
  tkSel.onchange = filterChange;
  archSel.onchange = filterChange;
  document.getElementById('filter-format').onchange = filterChange;
}

function filterChange() {
  // Currently filtering only resets the deck — could be enhanced
  idx = 0;
  while (idx < ads.length && (!matchesFilters(ads[idx]) || reviews[ads[idx].id])) idx++;
  render();
}

function matchesFilters(ad) {
  const tk = document.getElementById('filter-toolkit').value;
  const fmt = document.getElementById('filter-format').value;
  const arch = document.getElementById('filter-archetype').value;
  if (tk && ad.toolkit !== tk) return false;
  if (fmt && ad.format !== fmt) return false;
  if (arch && ad.archetype !== arch) return false;
  return true;
}

function render() {
  const stack = document.getElementById('card-stack');
  // Clear existing cards (keep swipe-hints)
  stack.querySelectorAll('.card').forEach(c => c.remove());

  const remaining = ads.slice(idx).filter(matchesFilters).filter(a => !reviews[a.id]);
  if (remaining.length === 0) {
    showEndScreen();
    return;
  }

  // Render top 3 cards (current + behind-1 + behind-2)
  for (let i = Math.min(2, remaining.length - 1); i >= 0; i--) {
    const ad = remaining[i];
    const card = document.createElement('div');
    card.className = 'card' + (i === 1 ? ' behind-1' : i === 2 ? ' behind-2' : '');
    card.innerHTML = `
      <div class="card-image">
        ${ad.url ? `<img src="${ad.url}" alt="${ad.headline || ''}">` : `<div class="placeholder"><div class="spin"></div><div>Generating…</div></div>`}
        <div class="format-badge">${ad.format || ''}</div>
      </div>
      <div class="card-meta">
        <div class="row">
          <span class="pill">${ad.toolkit || ''}</span>
          <span>${ad.archetype || ''}</span>
        </div>
        <div class="headline">${ad.headline ? '"' + ad.headline + '"' : ''}</div>
        <div class="persona">${ad.persona || ''}</div>
      </div>`;
    stack.appendChild(card);
  }
  updateStats();
}

function rate(verdict) {
  const remaining = ads.slice(idx).filter(matchesFilters).filter(a => !reviews[a.id]);
  if (!remaining.length) return;
  const ad = remaining[0];
  reviews[ad.id] = { verdict, ts: Date.now() };
  saveReviews();
  history.push(ad.id);

  // Animate
  const cards = document.querySelectorAll('.card-stack .card');
  if (cards[0]) {
    const cls = verdict === 'approve' ? 'swipe-right' : verdict === 'reject' ? 'swipe-left' : verdict === 'star' ? 'swipe-up' : 'swipe-left';
    cards[0].classList.add(cls);
  }
  setTimeout(() => render(), 200);
}

function undo() {
  if (!history.length) return;
  const lastId = history.pop();
  delete reviews[lastId];
  saveReviews();
  render();
}

function updateStats() {
  const counts = { approve: 0, reject: 0, star: 0, skip: 0 };
  Object.values(reviews).forEach(r => { if (counts[r.verdict] != null) counts[r.verdict]++; });
  document.getElementById('stat-approve').textContent = counts.approve;
  document.getElementById('stat-reject').textContent = counts.reject;
  document.getElementById('stat-star').textContent = counts.star;
  document.getElementById('stat-skip').textContent = counts.skip;
  const total = ads.length;
  const done = Object.keys(reviews).length;
  document.getElementById('progress-fill').style.width = total > 0 ? (100 * done / total) + '%' : '0%';
}

function showEndScreen() {
  const stack = document.getElementById('card-stack');
  stack.style.display = 'none';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('hotkeys').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  const end = document.getElementById('end-screen');
  end.classList.add('active');

  const counts = { approve: 0, reject: 0, star: 0, skip: 0 };
  Object.values(reviews).forEach(r => { if (counts[r.verdict] != null) counts[r.verdict]++; });
  document.getElementById('end-total').textContent = Object.keys(reviews).length;
  document.getElementById('end-approve').textContent = counts.approve;
  document.getElementById('end-reject').textContent = counts.reject;
  document.getElementById('end-star').textContent = counts.star;
  document.getElementById('end-skip').textContent = counts.skip;

  // Show approved grid
  const approvedAds = ads.filter(a => reviews[a.id] && (reviews[a.id].verdict === 'approve' || reviews[a.id].verdict === 'star'));
  const grid = document.getElementById('approved-grid');
  grid.innerHTML = approvedAds.map(a => `
    <div class="approved-card">
      ${a.url ? `<img src="${a.url}" alt="${a.headline || ''}">` : ''}
      <div class="approved-meta">
        ${reviews[a.id].verdict === 'star' ? '★ ' : ''}<strong>${a.headline ? a.headline.slice(0, 60) : ''}</strong><br>
        ${a.toolkit} · ${a.format}
      </div>
    </div>`).join('');
}

function reopenReview() {
  document.getElementById('end-screen').classList.remove('active');
  document.getElementById('card-stack').style.display = 'block';
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('hotkeys').style.display = 'block';
  idx = 0;
  while (idx < ads.length && reviews[ads[idx].id]) idx++;
  render();
}

function resetReviews() {
  if (!confirm('Clear all reviews?')) return;
  reviews = {};
  history = [];
  saveReviews();
  idx = 0;
  document.getElementById('end-screen').classList.remove('active');
  document.getElementById('card-stack').style.display = 'block';
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('hotkeys').style.display = 'block';
  render();
}

function exportCSV() {
  const approved = ads.filter(a => reviews[a.id] && (reviews[a.id].verdict === 'approve' || reviews[a.id].verdict === 'star'));
  const headers = ['Verdict', 'Toolkit', 'Concept ID', 'Format', 'Archetype', 'Headline', 'Persona', 'URL'];
  const rows = approved.map(a => [
    reviews[a.id].verdict,
    a.toolkit,
    a.conceptId || '',
    a.format,
    a.archetype,
    (a.headline || '').replace(/"/g, '""'),
    (a.persona || '').replace(/"/g, '""'),
    a.url || ''
  ]);
  const csv = [headers.join(','), ...rows.map(r => r.map(c => `"${c}"`).join(','))].join('\n');
  download('fs-approved-ads.csv', csv, 'text/csv');
}

function exportJSON() {
  const out = { generatedAt: new Date().toISOString(), totalReviewed: Object.keys(reviews).length, reviews };
  download('fs-reviews.json', JSON.stringify(out, null, 2), 'application/json');
}

function download(filename, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

document.addEventListener('keydown', (e) => {
  if (document.getElementById('end-screen').classList.contains('active')) return;
  const stack = document.getElementById('card-stack');
  if (stack.style.display === 'none') return;

  if (e.key === 'ArrowLeft') { stack.dataset.swipe = 'left'; rate('reject'); }
  else if (e.key === 'ArrowRight') { stack.dataset.swipe = 'right'; rate('approve'); }
  else if (e.key === 'ArrowUp') { stack.dataset.swipe = 'up'; rate('star'); }
  else if (e.key === 'ArrowDown') rate('skip');
  else if (e.key === 'u' || e.key === 'U') undo();
  else if (e.key === 'f' || e.key === 'F') showEndScreen();

  setTimeout(() => { stack.dataset.swipe = ''; }, 250);
});

init();
</script>

</body>
