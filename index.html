<style>

    --pink: #ff2e92;
    --brand: #7c3aed;
    --ecom: #2563eb;
    --growth: #16a34a;
    --ops: #d97706;
    --product: #db2777;
  }
  body { font-family: 'Inter', sans-serif; background: var(--gray-50); color: var(--gray-900); }

  /* HEADER */
  .header {
    background: var(--black); color: var(--white);
    padding: 40px 48px 32px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { color: var(--pink); }
  .header p { font-size: 13px; color: var(--gray-400); margin-top: 4px; }
  .search-wrap { position: relative; flex-shrink: 0; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gray-500); pointer-events: none; }
  #search {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px; padding: 9px 14px 9px 36px;
    color: var(--white); font-family: 'Inter', sans-serif; font-size: 14px;
    width: 260px; outline: none;
  }
  #search::placeholder { color: var(--gray-500); }
  #search:focus { border-color: var(--pink); }

  /* DEPT TABS */
  .tabs { display: flex; gap: 4px; margin-top: 20px; }
  .tab {
    padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; background: transparent; color: var(--gray-400);
    transition: all 0.15s; text-transform: capitalize; letter-spacing: 0.2px;
  }
  .tab:hover { color: var(--white); background: rgba(255,255,255,0.08); }
  .tab.active { color: var(--white); background: rgba(255,255,255,0.12); }
  .tab[data-dept="all"].active { background: var(--pink); color: var(--white); }
  .tab[data-dept="brand"].active { background: var(--brand); color: var(--white); }
  .tab[data-dept="ecom"].active { background: var(--ecom); color: var(--white); }
  .tab[data-dept="growth"].active { background: var(--growth); color: var(--white); }
  .tab[data-dept="ops"].active { background: var(--ops); color: var(--white); }
  .tab[data-dept="product"].active { background: var(--product); color: var(--white); }

  /* MAIN */
  .main { max-width: 1280px; margin: 0 auto; padding: 40px 48px 80px; }

  /* DEPT SECTION */
  .dept-section { margin-bottom: 48px; }
  .dept-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    padding-bottom: 12px; border-bottom: 1px solid var(--gray-200);
  }
  .dept-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dept-title { font-size: 18px; font-weight: 600; text-transform: capitalize; }
  .dept-count { font-size: 13px; color: var(--gray-400); font-weight: 400; }

  /* FOLDER GRID */
  .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

  /* FOLDER CARD */
  .folder-card {
    background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px;
    overflow: hidden;
  }
  .folder-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; border-bottom: 1px solid var(--gray-100);
    cursor: default;
  }
  .folder-icon { font-size: 16px; flex-shrink: 0; }
  .folder-name { font-size: 14px; font-weight: 600; flex: 1; min-width: 0; }
  .type-badge {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px;
    padding: 2px 7px; border-radius: 4px; flex-shrink: 0;
    background: var(--gray-100); color: var(--gray-500);
  }
  .doc-count {
    font-size: 11px; color: var(--gray-400); flex-shrink: 0;
    background: var(--gray-100); border-radius: 10px; padding: 1px 7px;
  }

  /* DOC LIST */
  .doc-list { padding: 8px 0; }
  .doc-item { display: flex; align-items: center; gap: 8px; padding: 0; }
  .doc-item a {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 16px; width: 100%; text-decoration: none; color: var(--gray-700);
    font-size: 13px; transition: background 0.1s;
  }
  .doc-item a:hover { background: var(--gray-50); color: var(--gray-900); }
  .doc-item a svg { flex-shrink: 0; color: var(--gray-300); }
  .doc-item .doc-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* COLLAPSIBLE */
  .collapse-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 16px; width: 100%; background: none; border: none;
    cursor: pointer; font-size: 13px; color: var(--gray-500);
    font-family: 'Inter', sans-serif; transition: background 0.1s; text-align: left;
  }
  .collapse-btn:hover { background: var(--gray-50); color: var(--gray-700); }
  .collapse-btn svg { transition: transform 0.2s; flex-shrink: 0; }
  .collapse-btn.open svg { transform: rotate(90deg); }
  .collapsible-docs { display: none; }
  .collapsible-docs.open { display: block; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 80px 40px; color: var(--gray-400); }
  .empty p { font-size: 15px; margin-top: 8px; }

  /* HIDDEN */
  .hidden { display: none !important; }
</style>
</head>

// ── RENDER ────────────────────────────────────────────────────────────────────
const DEPTS = ['brand', 'ecom', 'growth', 'ops', 'product'];
let activeDept = 'all';
let searchQuery = '';

function iconSvg() {
  return `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>`;
}

function chevronSvg() {
  return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>`;
}

function folderIconSvg(color) {
  return `<svg width="16" height="16" viewBox="0 0 24 24" fill="${color}22" stroke="${color}" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`;
}

function renderCard(entry) {
  const color = DEPT_COLORS[entry.dept];
  const typeLabel = TYPE_LABELS[entry.type] || entry.type;
  const isCollapsible = entry.collapsible && entry.docs.length > 4;
  const previewDocs = isCollapsible ? entry.docs.slice(0, 3) : entry.docs;
  const extraDocs = isCollapsible ? entry.docs.slice(3) : [];
  const id = `${entry.dept}-${entry.type}-${entry.folder}`.replace(/[^a-z0-9-]/g, '-');

  const docItem = (doc) => `
    <div class="doc-item" data-name="${doc.name.toLowerCase()}">
      <a href="${BASE}${doc.path}" target="_blank" rel="noopener">
        ${iconSvg()}
        <span class="doc-name">${doc.name}</span>
      </a>
    </div>`;

  return `
    <div class="folder-card" data-dept="${entry.dept}" data-folder="${entry.folder.toLowerCase()}" data-docs="${entry.docs.map(d=>d.name.toLowerCase()).join('|')}">
      <div class="folder-header">
        ${folderIconSvg(color)}
        <span class="folder-name">${slugToTitle(entry.folder)}</span>
        <span class="type-badge">${typeLabel}</span>
        <span class="doc-count">${entry.docs.length}</span>
      </div>
      <div class="doc-list">
        ${previewDocs.map(docItem).join('')}
        ${isCollapsible ? `
          <div class="collapsible-docs" id="extra-${id}">
            ${extraDocs.map(docItem).join('')}
          </div>
          <button class="collapse-btn" onclick="toggleExtra('extra-${id}', this)">
            ${chevronSvg()}
            Show ${extraDocs.length} more files
          </button>
        ` : ''}
      </div>
    </div>`;
}

function slugToTitle(slug) {
  return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function toggleExtra(id, btn) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
  btn.classList.toggle('open');
  const count = el.querySelectorAll('.doc-item').length;
  btn.innerHTML = btn.classList.contains('open')
    ? `${chevronSvg()} Show fewer files`
    : `${chevronSvg()} Show ${count} more files`;
}

function countDeptDocs(dept) {
  return DATA.filter(e => e.dept === dept).reduce((sum, e) => sum + e.docs.length, 0);
}

function render() {
  const main = document.getElementById('main');
  const depts = activeDept === 'all' ? DEPTS : [activeDept];
  let html = '';
  let anyVisible = false;

  for (const dept of depts) {
    const entries = DATA.filter(e => {
      if (e.dept !== dept) return false;
      if (!searchQuery) return true;
      const q = searchQuery.toLowerCase();
      return e.folder.includes(q) || e.docs.some(d => d.name.toLowerCase().includes(q));
    });
    if (!entries.length) continue;
    anyVisible = true;
    const color = DEPT_COLORS[dept];
    const total = entries.reduce((s, e) => s + e.docs.length, 0);
    html += `
      <div class="dept-section">
        <div class="dept-header">
          <div class="dept-dot" style="background:${color}"></div>
          <span class="dept-title">${dept}</span>
          <span class="dept-count">${entries.length} folder${entries.length !== 1 ? 's' : ''} · ${total} doc${total !== 1 ? 's' : ''}</span>
        </div>
        <div class="folder-grid">
          ${entries.map(renderCard).join('')}
        </div>
      </div>`;
  }

  if (!anyVisible) {
    html = `<div class="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#d4d4d4" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>No documents match "<strong>${searchQuery}</strong>"</p>
    </div>`;
  }

  main.innerHTML = html;

  // If searching, expand all collapsibles
  if (searchQuery) {
    document.querySelectorAll('.collapsible-docs').forEach(el => el.classList.add('open'));
    // Hide non-matching doc items
    document.querySelectorAll('.doc-item').forEach(item => {
      const name = item.dataset.name || '';
      item.style.display = name.includes(searchQuery.toLowerCase()) || !searchQuery ? '' : 'none';
    });
  }
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeDept = tab.dataset.dept;
    render();
  });
});

// Search
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

render();
