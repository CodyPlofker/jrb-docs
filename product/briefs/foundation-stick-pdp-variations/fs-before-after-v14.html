<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JRB Foundation Stick Before/After — V14: Slider Left + Text Right</title>
<style>
@font-face { font-family: 'GeogrotesqueCondBoldWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Geogrotesque.ttf') format('truetype'); font-weight: 700; font-display: swap; }
@font-face { font-family: 'BaseMonoWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/BaseMonoWideThin_6014.ttf') format('truetype'); font-weight: 400; font-display: swap; }
@font-face { font-family: 'RingsideWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/RingsideWide-Book_Web.ttf') format('truetype'); font-weight: 400; font-display: swap; }
@font-face { font-family: 'Canela'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Canela-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
:root {
  --font-display: GeogrotesqueCondBoldWeb, 'Arial Black', Impact, sans-serif;
  --font-mono: BaseMonoWideWeb, Courier, 'Courier New', sans-serif;
  --font-body: RingsideWideWeb, Helvetica, Arial, sans-serif;
  --font-serif: Canela, serif;
  --ease-primary: cubic-bezier(.39, .575, .565, 1);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); font-size: 16px; line-height: 100%; color: #000; letter-spacing: .025em; -webkit-font-smoothing: antialiased; background: #fff; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
.button { display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 13px; font-weight: 550; text-transform: uppercase; letter-spacing: .4px; height: 40px; padding: 0 36px; border-radius: 2px; border: 1px solid #000; background: #000; color: #fff; cursor: pointer; transition: background .4s var(--ease-primary), color .4s var(--ease-primary); }
.has-mouse .button:not(:disabled):hover { background: transparent; color: #000; }
@media screen and (min-width: 768px) { .button { font-size: 14px; height: 44px; } }
.v-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #999; text-align: center; padding: 12px; background: #fff; }

.ba-v14 { padding: 64px 20px; background: #fff; }
.ba-v14__inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center; }
.ba-v14__copy { text-align: left; }
.ba-v14__eyebrow { font-family: var(--font-display); font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-block-end: 16px; }
.ba-v14__heading { font-family: var(--font-serif); font-size: 42px; font-weight: 300; line-height: 1.15; text-wrap: balance; margin-block-end: 16px; }
.ba-v14__subhead { font-family: var(--font-body); font-size: 16px; line-height: 1.6; margin-block-end: 28px; max-width: 440px; }
.ba-v14__slider { position: relative; aspect-ratio: 3 / 4; overflow: hidden; border-radius: 3px; }
.ba-v14__slider .a, .ba-v14__slider .b { position: absolute; inset: 0; }
.ba-v14__slider .a img, .ba-v14__slider .b img { width: 100%; height: 100%; object-fit: cover; }
.ba-v14__slider .b { clip-path: inset(0 50% 0 0); }
.ba-v14__line { position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: #fff; z-index: 2; }
.ba-v14__handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border-radius: 100%; background: #fff; border: 2px solid #000; z-index: 3; display: flex; align-items: center; justify-content: center; }
.ba-v14__handle::before { content: '\2194'; font-size: 18px; color: #000; }
@media (max-width: 768px) {
  .ba-v14 { padding: 40px 16px; }
  .ba-v14__inner { grid-template-columns: 1fr; gap: 28px; }
  .ba-v14__slider { order: -1; }
  .ba-v14__heading { font-size: 28px; }
}
</style>
</head>
<body class="has-mouse">
<div class="v-label">Foundation Stick &mdash; Before/After &mdash; V14: Slider Left + Text Right</div>
<section class="ba-v14">
  <div class="ba-v14__inner">
    <div class="ba-v14__slider">
      <div class="a"><img src="https://air-prod.imgix.net/3dd6c299-6630-440e-8f51-8c78fdbeae18.jpg?w=700&h=930&fit=crop&auto=format" alt="After" loading="lazy"></div>
      <div class="b"><img src="https://air-prod.imgix.net/f429435e-e95e-4c24-9691-d67623a86695.jpg?w=700&h=930&fit=crop&auto=format" alt="Before" loading="lazy"></div>
      <div class="ba-v14__line"></div><div class="ba-v14__handle"></div>
    </div>
    <div class="ba-v14__copy">
      <p class="ba-v14__eyebrow">Real Skin, Real Results</p>
      <h2 class="ba-v14__heading">Skin that looks like skin&mdash;only&nbsp;better.</h2>
      <p class="ba-v14__subhead">No mask. No cake. Just an even, lit-from-within finish that lasts all day. Drag to see the&nbsp;before.</p>
      <a href="#" class="button">Shop Foundation Stick</a>
    </div>
  </div>
</section>
</body>
</html>
