<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRB Miracle Balm Before/After — V01: 3-Column Cards</title>
  <style>
    @font-face { font-family: 'GeogrotesqueCondBoldWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Geogrotesque.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'BaseMonoWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/BaseMonoWideThin_6014.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'RingsideWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/RingsideWide-Book_Web.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Canela'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Canela-Light.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Canela'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Canela-LightItalic.otf') format('opentype'); font-weight: 300; font-style: italic; font-display: swap; }

    :root {
      --font-display: GeogrotesqueCondBoldWeb, 'Arial Black', Impact, sans-serif;
      --font-mono: BaseMonoWideWeb, Courier, 'Courier New', sans-serif;
      --font-body: RingsideWideWeb, Helvetica, Arial, sans-serif;
      --font-serif: Canela, serif;
      --color-black: #000;
      --color-white: #fff;
      --color-warm-bg: #f6f2eb;
      --color-accent: #ff2e92;
      --color-border: #d0d0d0;
      --ease-primary: cubic-bezier(.39, .575, .565, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); font-size: 16px; line-height: 100%; color: var(--color-black); letter-spacing: .025em; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; background: var(--color-white); }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }

    .button { display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 13px; font-weight: 550; text-transform: uppercase; letter-spacing: .4px; height: 40px; padding: 0 36px; border-radius: 2px; border: 1px solid var(--color-black); background: var(--color-black); color: var(--color-white); cursor: pointer; transition: background .4s var(--ease-primary), color .4s var(--ease-primary); }
    .has-mouse .button:not(:disabled):hover { background: transparent; color: var(--color-black); }
    @media screen and (min-width: 768px) { .button { font-size: 14px; height: 44px; } }

    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; } }

    .v-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #999; text-align: center; padding: 12px; background: var(--color-white); }

    .ba { padding: 64px 20px; background: var(--color-warm-bg); }
    .ba__inner { max-width: 1100px; margin: 0 auto; }
    .ba__eyebrow { font-family: var(--font-display); font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--color-black); text-align: center; margin-block-end: 16px; }
    .ba__heading { font-family: var(--font-serif); font-size: 38px; font-weight: 300; line-height: 1.2; color: var(--color-black); text-align: center; margin-block-end: 48px; }
    .ba__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .ba__card { background: var(--color-white); border-radius: 3px; box-shadow: 0 1px 2px rgba(16,24,40,.04); overflow: hidden; }
    .ba__images { display: grid; grid-template-columns: 1fr 1fr; }
    .ba__img-wrap { aspect-ratio: 2 / 3; overflow: hidden; position: relative; }
    .ba__img-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .ba__img-label { position: absolute; bottom: 8px; left: 8px; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: var(--color-white); background: rgba(0,0,0,.6); padding: 3px 8px; border-radius: 2px; }
    .ba__info { padding: 20px; }
    .ba__name { font-family: var(--font-display); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--color-black); margin-block-end: 2px; }
    .ba__meta { font-family: var(--font-body); font-size: 13px; color: var(--color-black); line-height: 1.5; }

    @media (max-width: 768px) {
      .ba { padding: 48px 16px; }
      .ba__heading { font-size: 26px; margin-block-end: 32px; }
      .ba__grid { grid-template-columns: 1fr; gap: 20px; }
    }
  </style>
</head>
<body class="has-mouse">

        <div class="ba__card">

              <span class="ba__img-label">Before</span>
            </div>
            <div class="ba__img-wrap">
              <img src="https://air-prod.imgix.net/c1323d9f-71be-4590-9bd7-be213be7032d.jpg?w=400&h=600&fit=crop&auto=format" alt="After Miracle Balm" loading="lazy">
              <span class="ba__img-label">After</span>

          </div>
          <div class="ba__info">

          </div>
        </div>

        <div class="ba__card">
          <div class="ba__images">
            <div class="ba__img-wrap">
              <img src="https://air-prod.imgix.net/829a45c8-4b8d-4d71-b351-e7da07a71532.jpg?w=400&h=600&fit=crop&auto=format" alt="Before Miracle Balm" loading="lazy">
              <span class="ba__img-label">Before</span>
            </div>
            <div class="ba__img-wrap">
              <img src="https://air-prod.imgix.net/476d8004-173d-4a6b-b040-8ee0f7a79da0.jpg?w=400&h=600&fit=crop&auto=format" alt="After Miracle Balm" loading="lazy">
              <span class="ba__img-label">After</span>
            </div>
          </div>
          <div class="ba__info">
            <p class="ba__name">Maria L.</p>
            <p class="ba__meta">Age 46 &mdash; Shade: Magic Hour</p>
          </div>
        </div>

        <div class="ba__card">
          <div class="ba__images">
            <div class="ba__img-wrap">
              <img src="https://air-prod.imgix.net/a53971aa-9c94-4d41-82b6-8f4d2345317c.jpg?w=400&h=600&fit=crop&auto=format" alt="Before Miracle Balm" loading="lazy">
              <span class="ba__img-label">Before</span>
            </div>
            <div class="ba__img-wrap">
              <img src="https://air-prod.imgix.net/1d93b483-f9c5-4e9e-b8a5-1a998622b495.jpg?w=400&h=600&fit=crop&auto=format" alt="After Miracle Balm" loading="lazy">
              <span class="ba__img-label">After</span>
            </div>
          </div>
          <div class="ba__info">
            <p class="ba__name">Nia J.</p>
            <p class="ba__meta">Age 38 &mdash; Shade: Bronze</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
