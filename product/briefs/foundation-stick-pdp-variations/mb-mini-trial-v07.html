<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRB Miracle Balm Mini Trial CTA — V07: Inline ATC</title>
  <style>
    /* === FONTS (CDN) === */
    @font-face { font-family: 'GeogrotesqueCondBoldWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Geogrotesque.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'BaseMonoWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/BaseMonoWideThin_6014.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'RingsideWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/RingsideWide-Book_Web.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Canela'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Canela-Light.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }

    /* === CUSTOM PROPERTIES === */
    :root {
      --font-display: GeogrotesqueCondBoldWeb, 'Arial Black', Impact, sans-serif;
      --font-mono: BaseMonoWideWeb, Courier, 'Courier New', sans-serif;
      --font-body: RingsideWideWeb, Helvetica, Arial, sans-serif;
      --font-serif: Canela, serif;
      --color-black: #000;
      --color-white: #fff;
      --color-warm-bg: #f6f2eb;
      --color-accent: #ff2e92;
      --color-border: #d0d0d0;
      --ease-primary: cubic-bezier(.39, .575, .565, 1);
    }

    /* === RESET === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); font-size: 16px; line-height: 100%; color: var(--color-black); letter-spacing: .025em; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; background: var(--color-white); }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }

    /* === BUTTON === */
    .button { display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 13px; font-weight: 550; text-transform: uppercase; letter-spacing: .4px; height: 40px; padding: 0 36px; border-radius: 2px; border: 1px solid var(--color-black); background: var(--color-black); color: var(--color-white); cursor: pointer; transition: background .4s var(--ease-primary), color .4s var(--ease-primary); }
    .button--outline { background: transparent; color: var(--color-black); }
    .has-mouse .button:not(:disabled):hover { background: transparent; color: var(--color-black); }
    .has-mouse .button--outline:not(:disabled):hover { background: var(--color-black); color: var(--color-white); }
    @media screen and (min-width: 768px) { .button { font-size: 14px; height: 44px; } }

    /* === REDUCED MOTION === */
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; } }

    /* === VARIATION LABEL === */
    .v-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #999; text-align: center; padding: 12px; background: var(--color-white); }

    /* === V07: INLINE ATC === */
    .mini-trial { padding: 0 20px; background: var(--color-white); }
    .mini-trial__inner { max-width: 680px; margin: 0 auto; border: 1px solid var(--color-border); border-radius: 3px; padding: 20px 24px; display: flex; align-items: center; gap: 20px; }
    .mini-trial__thumb { width: 64px; height: 64px; border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .mini-trial__thumb img { width: 100%; height: 100%; object-fit: cover; }
    .mini-trial__text { flex: 1; min-width: 0; }
    .mini-trial__label { font-family: var(--font-body); font-size: 15px; line-height: 1.4; color: var(--color-black); }
    .mini-trial__label strong { font-weight: 700; }
    .mini-trial__detail { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .3px; color: var(--color-black); margin-block-start: 2px; }
    .mini-trial__action { flex-shrink: 0; }

    /* Context block above to show inline placement */
    .context-block { max-width: 680px; margin: 40px auto 24px; padding: 0 20px; }
    .context-block__heading { font-family: var(--font-serif); font-size: 38px; font-weight: 300; line-height: 1.2; color: var(--color-black); margin-block-end: 12px; }
    .context-block__body { font-family: var(--font-body); font-size: 16px; line-height: 1.6; color: var(--color-black); margin-block-end: 20px; }
    .context-block__price { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--color-black); margin-block-end: 16px; }
    .context-block__divider { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--color-black); opacity: .5; text-align: center; margin: 24px 0 24px; padding: 0 20px; }

    @media (max-width: 768px) {
      .mini-trial__inner { flex-direction: column; text-align: center; padding: 20px 16px; gap: 16px; }
      .mini-trial__thumb { width: 56px; height: 56px; }
      .context-block__heading { font-size: 26px; line-height: 1.3; }
    }
  </style>
</head>
<body class="has-mouse">
  <div class="v-label">Miracle Balm &mdash; Mini / Trial CTA &mdash; V07: Inline&nbsp;ATC</div>

  <!-- Simulated PDP context -->
  <div class="context-block">
    <h2 class="context-block__heading">Miracle Balm</h2>
    <p class="context-block__body">A clean, multi-use balm that gives your skin a dewy, healthy glow. Use on cheeks, lips, and&nbsp;eyelids.</p>
    <p class="context-block__price">$38 &mdash; Full Size</p>
    <a href="#" class="button">Add to Cart</a>
  </div>

  <p class="context-block__divider">Or</p>

  <!-- Inline Mini CTA -->
  <section class="mini-trial">
    <div class="mini-trial__inner">
      <div class="mini-trial__thumb">
        <img src="https://air-prod.imgix.net/a53971aa-9c94-4d41-82b6-8f4d2345317c.jpg?w=400&h=400&fit=crop&auto=format" alt="Mini Miracle Balm" loading="lazy">
      </div>
      <div class="mini-trial__text">
        <p class="mini-trial__label">Try the <strong>Mini</strong> instead &mdash; $22</p>
        <p class="mini-trial__detail">Same formula &middot; Free returns</p>
      </div>
      <div class="mini-trial__action">
        <a href="#" class="button button--outline">Add Mini</a>
      </div>
    </div>
  </section>
</body>
</html>
