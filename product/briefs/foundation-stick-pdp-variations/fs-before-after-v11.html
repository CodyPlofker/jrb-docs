@font-face { font-family: 'Canela'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Canela-Light.otf') format('opentype'); font-weight: 300; font-display: swap; }
:root {
  --font-display: GeogrotesqueCondBoldWeb, 'Arial Black', Impact, sans-serif;

  --ease-primary: cubic-bezier(.39, .575, .565, 1);
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); font-size: 16px; line-height: 100%; color: #000; letter-spacing: .025em; -webkit-font-smoothing: antialiased; background: #fff; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }

.has-mouse .button:not(:disabled):hover { background: transparent; color: #000; }
@media screen and (min-width: 768px) { .button { font-size: 14px; height: 44px; } }
.v-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #999; text-align: center; padding: 12px; background: #fff; }

.ba-v11 { padding: 56px 20px; background: #f8f8f8; }
.ba-v11__inner { max-width: 1200px; margin: 0 auto; text-align: center; }
.ba-v11__eyebrow { font-family: var(--font-display); font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-block-end: 12px; }
.ba-v11__heading { font-family: var(--font-serif); font-size: 32px; font-weight: 300; line-height: 1.2; text-wrap: balance; margin-block-end: 32px; }
.ba-v11__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-block-end: 28px; }
.ba-v11__slider { position: relative; aspect-ratio: 1 / 1; overflow: hidden; border-radius: 3px; }
.ba-v11__slider .a, .ba-v11__slider .b { position: absolute; inset: 0; }
.ba-v11__slider .a img, .ba-v11__slider .b img { width: 100%; height: 100%; object-fit: cover; }
.ba-v11__slider .b { clip-path: inset(0 50% 0 0); }
.ba-v11__line { position: absolute; top: 0; bottom: 0; left: 50%; width: 2px; background: #fff; z-index: 2; }
.ba-v11__handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 32px; height: 32px; border-radius: 100%; background: #fff; border: 2px solid #000; z-index: 3; display: flex; align-items: center; justify-content: center; }
.ba-v11__handle::before { content: '\2194'; font-size: 14px; color: #000; }
@media (max-width: 768px) {
  .ba-v11 { padding: 40px 16px; }
  .ba-v11__heading { font-size: 24px; }
  .ba-v11__grid { grid-template-columns: 1fr; gap: 16px; }
}
