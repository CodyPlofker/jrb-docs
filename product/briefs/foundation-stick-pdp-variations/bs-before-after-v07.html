<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRB Blushing Stick Before/After — V07: Split Slider</title>
  <style>
    @font-face { font-family: 'GeogrotesqueCondBoldWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Geogrotesque.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'BaseMonoWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/BaseMonoWideThin_6014.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'RingsideWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/RingsideWide-Book_Web.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Canela'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Canela-Light.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }

    :root {
      --font-display: GeogrotesqueCondBoldWeb, 'Arial Black', Impact, sans-serif;
      --font-mono: BaseMonoWideWeb, Courier, 'Courier New', sans-serif;
      --font-body: RingsideWideWeb, Helvetica, Arial, sans-serif;
      --font-serif: Canela, serif;
      --color-black: #000;
      --color-white: #fff;
      --color-warm-bg: #f6f2eb;
      --color-accent: #ff2e92;
      --color-border: #d0d0d0;
      --ease-primary: cubic-bezier(.39, .575, .565, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); font-size: 16px; line-height: 100%; color: var(--color-black); letter-spacing: .025em; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; background: var(--color-white); }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }

    .button { display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 13px; font-weight: 550; text-transform: uppercase; letter-spacing: .4px; height: 40px; padding: 0 36px; border-radius: 2px; border: 1px solid var(--color-black); background: var(--color-black); color: var(--color-white); cursor: pointer; transition: background .4s var(--ease-primary), color .4s var(--ease-primary); }
    .has-mouse .button:not(:disabled):hover { background: transparent; color: var(--color-black); }
    @media screen and (min-width: 768px) { .button { font-size: 14px; height: 44px; } }

    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; } }

    .v-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #999; text-align: center; padding: 12px; background: var(--color-white); }

    .ba-section { padding: 64px 20px; background: var(--color-warm-bg); }
    .ba-section__inner { max-width: 700px; margin: 0 auto; text-align: center; }
    .ba-section__eyebrow { font-family: var(--font-display); font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-block-end: 16px; }
    .ba-section__heading { font-family: var(--font-serif); font-size: 38px; font-weight: 300; line-height: 1.2; margin-block-end: 12px; }
    .ba-section__subhead { font-family: var(--font-body); font-size: 16px; line-height: 1.6; max-width: 480px; margin: 0 auto 48px; }

    .slider-container { position: relative; overflow: hidden; border-radius: 3px; margin-block-end: 48px; aspect-ratio: 3/4; max-width: 500px; margin-left: auto; margin-right: auto; }
    .slider-container__after { position: absolute; inset: 0; }
    .slider-container__after img { width: 100%; height: 100%; object-fit: cover; }
    .slider-container__before { position: absolute; inset: 0; width: 50%; overflow: hidden; z-index: 1; }
    .slider-container__before img { width: 200%; max-width: none; height: 100%; object-fit: cover; }
    .slider-container__divider { position: absolute; top: 0; bottom: 0; left: 50%; width: 3px; background: var(--color-white); z-index: 2; transform: translateX(-50%); }
    .slider-container__handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3; width: 40px; height: 40px; border-radius: 100%; background: var(--color-white); display: flex; align-items: center; justify-content: center; cursor: grab; }
    .slider-container__handle::before { content: ''; width: 16px; height: 2px; background: var(--color-black); }
    .slider-label { position: absolute; bottom: 16px; z-index: 2; font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .3px; background: var(--color-white); padding: 4px 10px; border-radius: 2px; }
    .slider-label--before { left: 16px; }
    .slider-label--after { right: 16px; }

    .slider-caption { font-family: var(--font-body); font-size: 14px; line-height: 1.5; margin-block-end: 40px; }

    @media (max-width: 768px) {
      .ba-section { padding: 48px 16px; }
      .ba-section__heading { font-size: 26px; line-height: 1.3; }
    }
  </style>
</head>
<body class="has-mouse">
  <div class="v-label">Blushing Stick &mdash; Before/After &mdash; V07: Split Slider</div>

  <section class="ba-section">
    <div class="ba-section__inner">
      <p class="ba-section__eyebrow">Drag to Reveal</p>
      <h2 class="ba-section__heading">See the difference yourself</h2>
      <p class="ba-section__subhead">Drag the slider to compare before and after. One swipe of Blushing Stick in&nbsp;Rosy.</p>

      <div class="slider-container">
        <div class="slider-container__after">
          <img src="https://air-prod.imgix.net/b5b14f30-338d-4e0f-9322-af316105a0e8.jpg?w=600&h=800&fit=crop&auto=format" alt="After Blushing Stick" loading="lazy">
        </div>
        <div class="slider-container__before">
          <img src="https://air-prod.imgix.net/b5b14f30-338d-4e0f-9322-af316105a0e8.jpg?w=600&h=800&fit=crop&auto=format&sat=-100" alt="Before Blushing Stick" loading="lazy">
        </div>
        <div class="slider-container__divider"></div>
        <div class="slider-container__handle"></div>
        <span class="slider-label slider-label--before">Before</span>
        <span class="slider-label slider-label--after">After</span>
      </div>

      <p class="slider-caption">Emily wearing Blushing Stick in Rosy &mdash; one&nbsp;swipe</p>

      <a href="#" class="button">Shop Blushing Stick</a>
    </div>
  </section>
</body>
</html>
