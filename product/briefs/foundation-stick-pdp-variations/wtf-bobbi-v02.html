<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRB WTF Bobbi — V02: Full-Bleed Portrait + Gradient Overlay</title>
  <style>
    @font-face { font-family: 'GeogrotesqueCondBoldWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Geogrotesque.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'BaseMonoWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/BaseMonoWideThin_6014.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'RingsideWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/RingsideWide-Book_Web.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Canela'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Canela-Light.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }

    :root {
      --font-display: GeogrotesqueCondBoldWeb, 'Arial Black', Impact, sans-serif;
      --font-mono: BaseMonoWideWeb, Courier, 'Courier New', sans-serif;
      --font-body: RingsideWideWeb, Helvetica, Arial, sans-serif;
      --font-serif: Canela, serif;
      --color-black: #000;
      --color-white: #fff;
      --color-warm-bg: #f6f2eb;
      --color-accent: #ff2e92;
      --color-border: #d0d0d0;
      --ease-primary: cubic-bezier(.39, .575, .565, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); font-size: 16px; line-height: 100%; color: var(--color-black); letter-spacing: .025em; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; background: var(--color-white); }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }

    .button { display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 13px; font-weight: 550; text-transform: uppercase; letter-spacing: .4px; height: 40px; padding: 0 36px; border-radius: 2px; border: 1px solid var(--color-white); background: var(--color-white); color: var(--color-black); cursor: pointer; transition: background .4s var(--ease-primary), color .4s var(--ease-primary); }
    .has-mouse .button:not(:disabled):hover { background: transparent; color: var(--color-white); }
    @media screen and (min-width: 768px) { .button { font-size: 14px; height: 44px; } }

    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; } }

    .v-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #999; text-align: center; padding: 12px; background: var(--color-white); }

    /* === FULL-BLEED PORTRAIT === */
    .bobbi-editorial { position: relative; min-height: 600px; overflow: hidden; }
    .bobbi-editorial__img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .bobbi-editorial__overlay { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,.75) 0%, rgba(0,0,0,.3) 50%, transparent 100%); }
    .bobbi-editorial__content { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 80px 40px; display: flex; flex-direction: column; justify-content: center; min-height: 600px; }
    .bobbi-editorial__eyebrow { font-family: var(--font-display); font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--color-white); margin-block-end: 16px; }
    .bobbi-editorial__quote { font-family: var(--font-serif); font-size: 42px; font-weight: 300; line-height: 1.2; color: var(--color-white); max-width: 520px; margin-block-end: 24px; }
    .bobbi-editorial__attribution { font-family: var(--font-body); font-size: 14px; color: var(--color-white); margin-block-end: 32px; line-height: 1.6; }
    .bobbi-editorial__cta { }

    @media (max-width: 768px) {
      .bobbi-editorial { min-height: 500px; }
      .bobbi-editorial__content { padding: 48px 16px; min-height: 500px; }
      .bobbi-editorial__overlay { background: linear-gradient(to top, rgba(0,0,0,.8) 0%, rgba(0,0,0,.3) 60%, transparent 100%); }
      .bobbi-editorial__content { justify-content: flex-end; }
      .bobbi-editorial__quote { font-size: 26px; line-height: 1.3; }
    }
  </style>
</head>
<body class="has-mouse">
  <div class="v-label">What The Foundation &mdash; Bobbi / Founder &mdash; V02: Full-Bleed Portrait + Gradient&nbsp;Overlay</div>

  <section class="bobbi-editorial">
    <img class="bobbi-editorial__img" src="https://air-prod.imgix.net/87f1416c-fef8-441a-b6eb-7733dd536b2f.jpg?w=1200&h=800&fit=crop&auto=format" alt="Bobbi Brown, founder of Jones Road Beauty" loading="lazy">
    <div class="bobbi-editorial__overlay"></div>
    <div class="bobbi-editorial__content">
      <p class="bobbi-editorial__eyebrow">Bobbi Brown</p>
      <blockquote class="bobbi-editorial__quote">"I've spent 40 years in beauty. This is the product I wish I'd made&nbsp;first."</blockquote>
      <p class="bobbi-editorial__attribution">Bobbi Brown &mdash; Founder, Jones Road Beauty<br>Former founder, Bobbi Brown Cosmetics</p>
      <div class="bobbi-editorial__cta">
        <a href="#" class="button">Shop What The Foundation</a>
      </div>
    </div>
  </section>
</body>
</html>
