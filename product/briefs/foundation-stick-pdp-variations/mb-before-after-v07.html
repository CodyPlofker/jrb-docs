<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JRB Miracle Balm Before/After — V07: Split Slider Concept</title>
  <style>
    @font-face { font-family: 'GeogrotesqueCondBoldWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Geogrotesque.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'BaseMonoWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/BaseMonoWideThin_6014.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'RingsideWideWeb'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/RingsideWide-Book_Web.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Canela'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Canela-Light.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Canela'; src: url('https://jrb-fonts-cdn.vercel.app/fonts/Canela-LightItalic.otf') format('opentype'); font-weight: 300; font-style: italic; font-display: swap; }

    :root {
      --font-display: GeogrotesqueCondBoldWeb, 'Arial Black', Impact, sans-serif;
      --font-mono: BaseMonoWideWeb, Courier, 'Courier New', sans-serif;
      --font-body: RingsideWideWeb, Helvetica, Arial, sans-serif;
      --font-serif: Canela, serif;
      --color-black: #000;
      --color-white: #fff;
      --color-warm-bg: #f6f2eb;
      --color-accent: #ff2e92;
      --color-border: #d0d0d0;
      --ease-primary: cubic-bezier(.39, .575, .565, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); font-size: 16px; line-height: 100%; color: var(--color-black); letter-spacing: .025em; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; background: var(--color-white); }
    img { display: block; max-width: 100%; }
    a { text-decoration: none; color: inherit; }

    .button { display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 13px; font-weight: 550; text-transform: uppercase; letter-spacing: .4px; height: 40px; padding: 0 36px; border-radius: 2px; border: 1px solid var(--color-black); background: var(--color-black); color: var(--color-white); cursor: pointer; transition: background .4s var(--ease-primary), color .4s var(--ease-primary); }
    .has-mouse .button:not(:disabled):hover { background: transparent; color: var(--color-black); }
    @media screen and (min-width: 768px) { .button { font-size: 14px; height: 44px; } }

    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; } }

    .v-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: #999; text-align: center; padding: 12px; background: var(--color-white); }

    .ba { padding: 64px 20px; background: var(--color-warm-bg); }
    .ba__inner { max-width: 900px; margin: 0 auto; }
    .ba__eyebrow { font-family: var(--font-display); font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--color-black); text-align: center; margin-block-end: 16px; }
    .ba__heading { font-family: var(--font-serif); font-size: 38px; font-weight: 300; line-height: 1.2; color: var(--color-black); text-align: center; margin-block-end: 40px; }

    .ba__slider { position: relative; aspect-ratio: 4 / 3; border-radius: 3px; overflow: hidden; }
    .ba__slider-side { position: absolute; inset: 0; overflow: hidden; }
    .ba__slider-side--before { clip-path: inset(0 50% 0 0); }
    .ba__slider-side--after { clip-path: inset(0 0 0 50%); }
    .ba__slider-side img { width: 100%; height: 100%; object-fit: cover; }
    .ba__slider-label { position: absolute; top: 50%; transform: translateY(-50%); font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: .4px; color: var(--color-white); background: rgba(0,0,0,.6); padding: 6px 14px; border-radius: 2px; }
    .ba__slider-label--before { left: 20px; }
    .ba__slider-label--after { right: 20px; }
    .ba__slider-divider { position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); width: 3px; background: var(--color-white); z-index: 2; }
    .ba__slider-handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3; width: 44px; height: 44px; background: var(--color-white); border-radius: 100%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .ba__slider-arrows { display: flex; align-items: center; gap: 6px; color: var(--color-black); font-family: var(--font-mono); font-size: 12px; }
    .ba__instruction { font-family: var(--font-mono); font-size: 12px; text-transform: uppercase; letter-spacing: .4px; color: var(--color-black); text-align: center; margin-block-start: 16px; }

    @media (max-width: 768px) {
      .ba { padding: 48px 16px; }
      .ba__heading { font-size: 26px; margin-block-end: 28px; }
    }
  </style>
</head>
<body class="has-mouse">
  <div class="v-label">Miracle Balm &mdash; Before/After &mdash; V07: Split Slider Concept</div>

  <section class="ba">
    <div class="ba__inner">
      <p class="ba__eyebrow">Slide to Reveal</p>
      <h2 class="ba__heading">See the difference</h2>

      <div class="ba__slider">
        <div class="ba__slider-side ba__slider-side--before">
          <img src="https://air-prod.imgix.net/a53971aa-9c94-4d41-82b6-8f4d2345317c.jpg?w=1000&h=750&fit=crop&auto=format" alt="Before Miracle Balm" loading="lazy">
          <span class="ba__slider-label ba__slider-label--before">Before</span>
        </div>
        <div class="ba__slider-side ba__slider-side--after">
          <img src="https://air-prod.imgix.net/c1323d9f-71be-4590-9bd7-be213be7032d.jpg?w=1000&h=750&fit=crop&auto=format" alt="After Miracle Balm" loading="lazy">
          <span class="ba__slider-label ba__slider-label--after">After</span>
        </div>
        <div class="ba__slider-divider"></div>
        <div class="ba__slider-handle">
          <span class="ba__slider-arrows">&larr; &rarr;</span>
        </div>
      </div>
      <p class="ba__instruction">Drag to compare before and&nbsp;after</p>
    </div>
  </section>
</body>
</html>
